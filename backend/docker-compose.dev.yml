services:
  redis:
    image: redis:7-alpine
    container_name: clinica_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:22
    container_name: clinica_backend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx ts-node-dev --respawn --transpile-only --poll server.ts"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_DEV=${DATABASE_URL_DEV:-${DATABASE_URL}}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_OTP_PEPPER=${AUTH_OTP_PEPPER:-}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=${PORT:-3333}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - IDENTITY_GATEWAY_URL=${IDENTITY_GATEWAY_URL:-http://host.docker.internal:3000}
      - IDENTITY_GATEWAY_TIMEOUT_MS=${IDENTITY_GATEWAY_TIMEOUT_MS:-5000}
      - BOLETO_GATEWAY_TIMEOUT_MS=${BOLETO_GATEWAY_TIMEOUT_MS:-60000}
      - IDENTITY_SERVICE_TOKEN=${IDENTITY_SERVICE_TOKEN:-change-me-local-clinical-identity-token}
      - REDIS_URL=redis://redis:6379
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    depends_on:
      redis:
        condition: service_healthy
