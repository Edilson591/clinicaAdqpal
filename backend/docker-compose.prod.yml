services:
  redis:
    image: redis:7-alpine
    container_name: clinica_redis_prod
    restart: unless-stopped
    networks:
      - evolution-net
    volumes:
      - redis_data:/data
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica_backend_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_DEV=${DATABASE_URL_DEV}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_OTP_PEPPER=${AUTH_OTP_PEPPER:?AUTH_OTP_PEPPER is required}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - PORT=${PORT:-3333}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - IDENTITY_GATEWAY_URL=${IDENTITY_GATEWAY_URL:?IDENTITY_GATEWAY_URL is required}
      - IDENTITY_GATEWAY_TIMEOUT_MS=${IDENTITY_GATEWAY_TIMEOUT_MS:-5000}
      - IDENTITY_SERVICE_TOKEN=${IDENTITY_SERVICE_TOKEN:?IDENTITY_SERVICE_TOKEN is required}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_API_VERSION=${WHATSAPP_API_VERSION:-v17.0}
      - PLUGGY_CLIENT_ID=${PLUGGY_CLIENT_ID}
      - PLUGGY_CLIENT_SECRET=${PLUGGY_CLIENT_SECRET}
      - PLUGGY_WEBHOOK_URL=${PLUGGY_WEBHOOK_URL}
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - NFE_URL=${NFE_URL}
      - NFE_LOGIN=${NFE_LOGIN} 
      - NFE_SENHA=${NFE_SENHA}
      - NFSE_MODE=${NFSE_MODE}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_USER=${SMTP_USER}
    ports:
      - "${PORT:-3333}:${PORT:-3333}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${PORT:-3333}/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - evolution-net

volumes:
  redis_data:


networks:
  evolution-net:
    name: evolution-net
    driver: bridge
  dokploy-network:
    external: true
