n\nO desenvolvimento de projetos como o Projeto Cida requer o envolvimento de diversos setores da sociedade. Para isso, é importante fazer parcerias que possam ser estabelecidas a fim de garantir o sucesso e a continuidade do projeto.\n\nA seguir, são apresentadas algumas possíveis parcerias para o Projeto Cida:\n\nInstituições educacionais: as instituições educacionais, como escolas e universidades, podem ser parceiras no projeto de ensino para pessoas com deficiência, contribuindo com recursos humanos, espaço físico e materiais didáticos.\n\nOrganizações governamentais: as organizações governamentais, como secretarias de educação e órgãos responsáveis pela inclusão social, podem ser parceiras no projeto de ensino para pessoas com deficiência, oferecendo suporte financeiro, legislação de inclusão e políticas públicas para a educação.\n\nOrganizações não governamentais: as organizações não governamentais, como associações de pessoas com deficiência e grupos de apoio, podem ser parceiras no projeto de ensino para pessoas com deficiência, fornecendo conhecimento especializado, experiência em projetos similares e orientação técnica.\n\nEmpresas: as empresas podem ser parceiras no projeto de ensino para pessoas com deficiência, oferecendo recursos financeiros e materiais, além de programas de voluntariado para seus funcionários.\n\nComunidade: a comunidade em geral pode ser parceira no projeto de ensino para pessoas com deficiência, apoiando a iniciativa e promovendo a inclusão social, além de oferecer suporte emocional e incentivo aos alunos com deficiência.\n\nO Projeto Cida estará sempre aberto a novas parcerias e a adaptações de acordo com as necessidades identificadas ao longo do processo.\n\nO AMBIENTE\n\nA acessibilidade é fundamental para garantir que as pessoas com deficiência possam ter acesso ao ensino e ao aprendizado em condições de igualdade. Estruturar um ambiente acessível envolve considerar as necessidades específicas de cada tipo de deficiência e implementar medidas para tornar o ambiente o mais inclusivo possível. O ambiente acessível e inclusivo promove a igualdade de oportunidades e contribui para o desenvolvimento e sucesso educacional de todos os alunos.\n\nPara estruturar o ambiente acessível para o ensino de pessoas com deficiência, é preciso considerar as necessidades específicas de cada tipo de deficiência, levando em conta as características físicas, sensoriais e cognitivas dos alunos. O Projeto Cida tornará o ambiente mais acessível, incluindo entre outras necessidade, os seguintes parâmetros estruturais:\n\nAcessibilidade arquitetônica: o ambiente vai ser projetado para permitir o fácil acesso e a mobilidade de alunos com deficiência física. Rampas, corrimões, elevadores e banheiros acessíveis são essenciais.\n\nIluminação adequada: a iluminação vai ser adequada para facilitar a leitura de materiais e evitar a fadiga visual. Pessoas com deficiência visual precisam de luz adequada para leitura em braille, e as pessoas com deficiência auditiva podem precisar de um ambiente bem iluminado para leitura labial.\n\nSinalização adequada: as informações do ambiente, como as placas de\n\nsinalização, vão estar em formatos acessíveis, como Braille, e cores contrastantes para facilitar a visualização.\n\nTecnologia assistiva: a tecnologia assistiva é uma ferramenta importante para garantir a acessibilidade no ambiente de ensino. Isso incluirá leitores de tela, teclados adaptados, fones de ouvido, software de reconhecimento de voz, entre outros.\n\nMobiliário adequado: as mesas e cadeiras vão ser ajustáveis para acomodar diferentes alturas e posturas, e devem ser projetadas para acomodar alunos com deficiência física.\n\nRecursos didáticos acessíveis: será disponibilizado materiais didáticos em formatos acessíveis, como livros em Braille, materiais em áudio e vídeos com legendas. As informações vão ser organizadas de forma clara e bem estruturada para facilitar a compreensão.\n\nTreinamento de professores: os professores vão ser treinados para atender às necessidades específicas de cada aluno com deficiência, como a forma de comunicação e interação, as adaptações curriculares necessárias, entre outros aspectos.\n\nORÇAMENTO ESTRUTURAL (Média)\n\nO orçamento para estruturar o ambiente acessível para o ensino de pessoas com deficiência pode variar dependendo do tamanho do espaço, das necessidades específicas dos alunos e das adaptações necessárias. Abaixo está um exemplo de itens e preços para orçar um ambiente acessível:\n\nAcessibilidade arquitetônica: rampas, corrimões, elevadores e banheiros\n\nacessíveis podem custar em média R$ 20.000,00.\n\nIluminação adequada: o custo para instalação de lâmpadas LED ou outros\n\ndispositivos de iluminação específicos para atender as necessidades dos alunos com deficiência visual pode variar de R$ 5.000,00 a R$ 10.000,00.\n\nSinalização adequada: a sinalização adequada com informações em Braille e cores\n\ncontrastantes pode ter um custo médio de R$ 2.500,00.\n\nTecnologia assistiva: o custo de dispositivos de tecnologia assistiva, como leitores\n\nde tela e software de reconhecimento de voz, pode variar de R$ 5.000,00 a R$\n\n20.000,00, dependendo do tipo e quantidade de equipamentos necessários.\n\nMobiliário adequado: mesas e cadeiras ajustáveis para acomodar diferentes\n\nalturas e posturas podem ter um custo médio de R$ 10.000,00.\n\nRecursos didáticos acessíveis: a disponibilização de materiais didáticos em formatos acessíveis, como livros em Braille, áudio e vídeos com legendas, pode custar em média R$ 3.000,00.\n\nTreinamento de professores: os custos de treinamento de professores para atender às necessidades específicas dos alunos com deficiência podem variar dependendo do programa de formação e do número de professores, mas um orçamento de R$ 5.000,00 é uma estimativa razoável.\n\nSomando todos os itens acima, o custo total para estruturar um ambiente acessível para o ensino de pessoas com deficiência pode variar de R$ 50.000,00 a R$ 70.000,00. No entanto, vale ressaltar que os custos podem variar dependendo das necessidades específicas de cada ambiente e das adaptações necessárias para torná-lo acessível.\n\nMÉTRICAS\n\nMedir a evolução do Projeto Cida será uma etapa importante para avaliar e acompanhar se os objetivos propostos estão sendo alcançados e identificar possíveis ajustes necessários. A seguir, são apresentadas algumas sugestões de indicadores que podem ser utilizados para medir a evolução de um projeto de ensino para pessoas com deficiência:\n\nTaxa de participação: esse indicador mede a proporção de alunos com deficiência que estão participando do projeto em relação ao total de alunos com deficiência identificados na região. Ele pode ser medido ao longo do tempo para verificar se a participação está aumentando ou diminuindo.\n\nDesempenho escolar: o desempenho escolar dos alunos com deficiência pode ser medido por meio de avaliações e testes. É importante comparar o desempenho desses alunos antes e depois do início do projeto para verificar se houve uma melhora.\n\nTaxa de retenção: a taxa de retenção mede a proporção de alunos com deficiência que continuam no projeto ao longo do tempo. Esse indicador pode ser utilizado para avaliar se o projeto está conseguindo manter os alunos engajados e motivados.\n\nSatisfação dos alunos e familiares: a opinião dos alunos com deficiência e de seus familiares pode ser medida por meio de pesquisas e entrevistas. É importante verificar se eles estão satisfeitos com o projeto e se sentem que estão aprendendo e se desenvolvendo.\n\nParticipação em atividades extracurriculares: o envolvimento dos alunos com deficiência em atividades extracurriculares pode ser um indicador de que eles estão se sentindo mais confiantes e integrados na escola. É importante medir a proporção de alunos com deficiência que estão participando de atividades extracurriculares em comparação com o total de alunos com deficiência.\n\nOs indicadores sugeridos podem ser utilizados para acompanhar o progresso ao longo do tempo e verificar se o projeto está atendendo às necessidades dos alunos com deficiência. A adaptação dos indicadores de acordo com as características específicas do projeto e dos alunos envolvidos pode ser uma constante métrica.\n\nPLANEJAMENTO\n\nSegue abaixo um exemplo de planejamento de implementação do Projeto Cida:\n\n1. Definição dos objetivos do projeto (2 semanas)\n\nReunião com a equipe para definir os objetivos e metas do projeto\n\nIdentificação das necessidades de aprendizagem dos alunos com deficiência a serem atendidos\n\n2. Identificação do público-alvo (1 semana)\n\nMapeamento das escolas e instituições especializadas para pessoas com\n\ndeficiência na região\n\nIdentificação dos alunos que serão atendidos pelo projeto\n\n3. Elaboração do plano de ensino (4 semanas)\n\nDefinição dos conteúdos a serem trabalhados\n\nSeleção dos materiais didáticos e recursos pedagógicos a serem utilizados\n\nPlanejamento das atividades e metodologias de ensino\n\n4. Estruturação do ambiente educacional (6 semanas)\n\nAdaptação do espaço físico para garantir a acessibilidade e a segurança dos\n\nalunos com deficiência\n\nAdaptação ou aquisição dos equipamentos e materiais necessários\n\n5. Formação da equipe de ensino (2 semanas)\n\n● Identificação e contratação dos profissionais de diferentes especialidades necessários para compor a equipe de ensino\n\n6. Desenvolvimento dos materiais didáticos (8 semanas)\n\n● Elaboração dos materiais didáticos adaptados às necessidades dos alunos\n\ncom deficiência\n\n7. Implementação do projeto (16 semanas)\n\nInício das atividades previstas no plano de ensino\n\nAcompanhamento e avaliação do processo de ensino-aprendizagem\n\n8. Avaliação do projeto (4 semanas)\n\nAvaliação dos resultados alcançados com o projeto\n\nIdentificação dos pontos fortes e pontos a serem melhorados\n\nPlanejamento de melhorias e ajustes necessários para continuidade do\n\nprojeto\n\nTotal: 43 semanas\n\nÉ importante lembrar que este planejamento pode ser ajustado de acordo com as necessidades e particularidades das informações precisas e atualizadas. Além disso, a implementação deste projeto de ensino para pessoas com deficiência requer um processo contínuo de adaptação e melhoria, e a avaliação constante do processo é fundamental para garantir a qualidade e a eficácia do ensino.\n\nCRONOGRAMA\n\nSegue abaixo um exemplo de cronograma de desenvolvimento do Projeto Cida:\n\nDefinição dos objetivos do projeto (2 semanas):\n\nIdentificar as necessidades de aprendizagem dos alunos com deficiência\n\nDefinir as metas a serem alcançadas com o projeto\n\nIdentificação do público-alvo (1 semana):\n\nIdentificar o perfil dos alunos com deficiência que serão atendidos pelo\n\nprojeto\n\nElaboração do plano de ensino (4 semanas):\n\nDefinir os conteúdos a serem trabalhados\n\nSelecionar os materiais didáticos e recursos pedagógicos a serem utilizados\n\nPlanejar as atividades e metodologias de ensino\n\nEstruturação do ambiente educacional (6 semanas):\n\nAdaptar o espaço físico para garantir a acessibilidade e a segurança dos\n\nalunos com deficiência\n\nAdquirir ou adaptar os equipamentos e materiais necessários\n\nFormação da equipe de ensino (2 semanas):\n\nIdentificar e contratar os profissionais de diferentes especialidades necessários para compor a equipe de ensino\n\nDesenvolvimento dos materiais didáticos (8 semanas):\n\nElaborar os materiais didáticos adaptados às necessidades dos alunos com\n\ndeficiência\n\nImplementação do projeto (16 semanas):\n\nIniciar as atividades previstas no plano de ensino\n\nRealizar o acompanhamento e avaliação do processo de\n\nensino-aprendizagem\n\nAvaliação do projeto (4 semanas):\n\nAvaliar os resultados alcançados com o projeto\n\nIdentificar pontos fortes e pontos a serem melhorados\n\nPlanejar melhorias e ajustes necessários para continuidade do projeto\n\nEste cronograma é apenas uma sugestão, e pode ser ajustado de acordo com as necessidades e particularidades das informações precisas e atualizadas. É importante lembrar que a educação inclusiva requer um processo contínuo de adaptação e melhoria, e que a avaliação constante do processo é fundamental para garantir a qualidade e a eficácia do ensino.\n\nPLANO DE MARKETING\n\nO plano de marketing vai ser uma excelente ferramenta para promover o Projeto Cida, divulgando seus objetivos, métodos e resultados esperados para a comunidade em geral. A seguir, vou descrever algumas etapas que podem ser incluídas nesse plano de marketing:\n\nDefinição de público-alvo e stakeholders: é importante identificar quem são as pessoas que mais se beneficiarão com o projeto de ensino, bem como aquelas que têm interesse em apoiar a iniciativa ou não. Dessa forma, é possível direcionar as ações de marketing para alcançar esses grupos específicos.\n\nCriação de uma identidade visual: um logotipo e uma identidade visual bem definidos podem ajudar a destacar o projeto de ensino, tornando-o mais reconhecível e atraindo a atenção do\n\npúblico. É importante que essa identidade visual esteja alinhada com os valores e objetivos do projeto.\n\nDesenvolvimento de materiais de divulgação: flyers, cartazes, folders, vídeos e outros materiais de divulgação podem ser criados para promover o projeto de ensino em locais estratégicos, como escolas, universidades, centros comunitários, associações e redes sociais.\n\nDivulgação em mídias sociais: as mídias sociais são excelentes ferramentas para promover o projeto de ensino e alcançar um público mais amplo. É possível criar uma página no Facebook, uma conta no Instagram e outras redes sociais para compartilhar informações, fotos, depoimentos e atualizações sobre o projeto.\n\nRealização de eventos: eventos, como palestras, workshops, aulas demonstrativas e outras atividades relacionadas ao projeto, podem ser organizados para atrair a atenção do público e mostrar os benefícios do ensino para pessoas com deficiência.\n\nParcerias estratégicas: parcerias com outras instituições, como escolas, universidades, ONGs, associações e empresas, podem ser estabelecidas para promover o projeto de ensino e expandir seu alcance.\n\nEssas são apenas algumas ideias que podem ser incluídas em um plano de marketing para o projeto de ensino para pessoas com deficiência. É importante lembrar que a divulgação deve ser feita de forma ética e responsável, respeitando as normas e diretrizes legais.\n\nPLANO DE MÍDIA\n\nO plano de mídia do Projeto Cida pode envolver diversas estratégias de comunicação para alcançar diferentes públicos e objetivos. Abaixo, segue um exemplo de um possível plano de mídia:\n\nIdentificação dos públicos e stakehokders: é importante identificar quem são as pessoas com deficiência que serão beneficiadas pelo projeto, assim como os familiares e cuidadores, profissionais da educação, instituições e organizações voltadas para o público com deficiência, entre outros.\n\nDefinição dos objetivos: é importante definir quais são os objetivos do projeto em\n\ntermos de comunicação. Alguns exemplos podem ser:\n\nSensibilizar a população em geral sobre a importância da inclusão escolar de pessoas com deficiência;\n\nDivulgar o projeto para potenciais parceiros, apoiadores e financiadores;\n\nInformar os familiares e cuidadores sobre o projeto e seus benefícios;\n\nConscientizar os profissionais da educação sobre a importância da formação\n\ninclusiva;\n\nDivulgar os resultados e impactos do projeto para a sociedade em geral.\n\nDefinição das estratégias de comunicação: a partir dos objetivos, é possível definir as estratégias de comunicação para alcançar cada público-alvo. Alguns exemplos podem ser:\n\nProdução de material impresso (folhetos, cartazes, banners) para distribuição em escolas, instituições e locais públicos estratégicos;\n\nCriação de um site e/ou redes sociais do projeto para divulgação de\n\ninformações, notícias e resultados;\n\nRealização de eventos de lançamento e/ou de sensibilização em escolas,\n\ninstituições e outros espaços;\n\nContato com veículos de comunicação locais (jornais, rádios, TVs) para\n\ndivulgação do projeto e de suas ações;\n\nParticipação em eventos e congressos voltados para a inclusão e a\n\neducação inclusiva.\n\nDefinição do cronograma e do orçamento: é importante definir um cronograma para as ações de comunicação, assim como um orçamento para a produção de materiais, realização de eventos, contratação de serviços de assessoria de imprensa, entre outros.\n\nMonitoramento e avaliação: por fim, é importante estabelecer indicadores para monitorar o impacto das ações de comunicação e avaliar os resultados do projeto como um todo. Isso pode ser feito por meio de pesquisas de opinião, análise de acessos no site e nas redes sociais, entre outras formas.\n\nPLANO DE VISIBILIDADE POLÍTICA\n\nO plano político de visibilidade vai ser uma estratégia efetiva para aumentar o impacto do Projeto Cida. Algumas ações que podem ser realizadas são:\n\nEnvolver políticos locais: Convidar políticos locais para visitar o projeto, fornecer atualizações sobre os resultados e discutir as necessidades do projeto com eles pode ajudar a aumentar a conscientização e a compreensão do projeto.\n\nParticipar de eventos políticos: Participar de eventos políticos, como comícios ou reuniões, pode ser uma maneira eficaz de aumentar a visibilidade do projeto e alcançar um público maior.\n\nDivulgar nas redes sociais: Usar as redes sociais para compartilhar atualizações sobre o projeto, postar fotos e vídeos do projeto em ação, e incentivar a participação da comunidade pode ajudar a criar uma base de apoiadores.\n\nRealizar uma campanha de mídia: Elaborar uma campanha de mídia, incluindo anúncios em jornais e televisão, entrevistas em programas de rádio e televisão, e cobertura em sites de notícias locais, pode ajudar a aumentar a conscientização e a visibilidade do projeto.\n\nEstabelecer parcerias com organizações políticas: Estabelecer parcerias com organizações políticas que tenham interesses semelhantes, como grupos de defesa de direitos das pessoas com deficiência, pode ajudar a ampliar o alcance e o\n\nIMPACTO DO PROJETO\n\nAo estabelecer o plano político de visibilidade, é importante ter em mente que o objetivo é envolver os políticos locais e aumentar a conscientização e o apoio da comunidade. Isso pode ajudar a garantir a continuidade do projeto e aumentar o impacto no longo prazo.\n\nFONTE DE FINANCIAMENTO\n\nMinistério da Eduação/Brasilia-DF\n\nValor total do Projeto\n\nR$: 450,000,00 ( Quatrocentos e cinquenta mil reais)\n\nMaria Edineide dos Santos\n\nPresidente da Instituição\n\nOficio n° 55/2023\n\nSão Miguel dos Campos-AL,15 de Julho de 2024\n\nAO MINISTÉRIO DA EDUCAÇÃO,\n\nNa oportunidade, Venho apresentar a Associação dos Depentes Quimicos e Portadores de Doençcas Psiquiatricas de São Miguel dos Campos/AL, com CNPJ sob n° 16.920.069/0001-73, qualificada como Utilidade Pública Municipal com a Lei nº 1.383, de 15 de abril de 2014, e pelo título de Utilidade Pública estadual com a Lei nº 7.571, de 18 de dezembro de 2013, e cadastrada no CNES com nº 9033459 no (MS), no rol das entidades Beneficentes. Vem solicitar deste Ministério à Liberação de Recuros para IMPANTAÇÃO DO PROJETO CIDA, que tem por finalidades tratar pacientes Com deficiencia: AUDITIVA, FISICA, INTELECTUAL E VISUAL. Considerando, que ainda nossa Associação não recebe recursos Publicos: Federal, Estadual e Municipal, e temos uma grande demanada que necessita desses serviços.\n\nPor tanto, na certeza de contar com vosso pronto atendimento, desde já agradecemos e colocamo-nos a sua disposição para trabalharmos em prol do nosso Municipio de São Miguel dos Campos-AL.\n\nAtenciosamente,\n\nMaria Edineide dos Santos\n\nPresidente da Instituição";

function loadTextBase(i, textId, fallback) {
  var area = document.getElementById(textId);
  if(!area) return;
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(textBaseStorageKey(i)) || 'null'); } catch(e) {}
  if(saved && typeof saved.texto === 'string') area.value = saved.texto;
  else if(!area.value) area.value = fallback;

  var align = document.getElementById('n'+i+'-align');
  if(align) align.value = saved && saved.align ? saved.align : 'justify';
  var sign = document.getElementById('n'+i+'-assinatura');
  if(sign) sign.checked = !(saved && saved.assinatura === false);
  var headerTitle = document.getElementById('n'+i+'-header-title');
  if(headerTitle && saved && typeof saved.headerTitle === 'string') headerTitle.value = saved.headerTitle;
  var headerSize = document.getElementById('n'+i+'-header-size');
  if(headerSize && saved && saved.headerSize) headerSize.value = saved.headerSize;
  var mainTitleSize = document.getElementById('n'+i+'-main-title-size');
  if(mainTitleSize && saved && saved.mainTitleSize) mainTitleSize.value = saved.mainTitleSize;
  var lineSpacing = document.getElementById('n'+i+'-line-spacing');
  if(lineSpacing && saved && saved.lineSpacing) lineSpacing.value = saved.lineSpacing;
}

function saveTextBase(i, textId) {
  var area = document.getElementById(textId);
  if(!area) return;
  var align = document.getElementById('n'+i+'-align');
  var sign = document.getElementById('n'+i+'-assinatura');
  localStorage.setItem(textBaseStorageKey(i), JSON.stringify({
    texto: area.value,
    align: align ? align.value : 'justify',
    assinatura: sign ? sign.checked : true,
    headerTitle: (document.getElementById('n'+i+'-header-title')||{}).value || '',

    lineSpacing: (document.getElementById('n'+i+'-line-spacing')||{}).value || '1.75'
  }));
  alert('Texto base salvo.');
}

function applyTextSelectionAlign(i, textId, align) {
  var area = document.getElementById(textId);
  if(!area) return;
  var start = area.selectionStart;
  var end = area.selectionEnd;
  if(start === end) {
    alert('Selecione primeiro o trecho do texto que deseja alinhar.');
    area.focus();
    return;
  }
  var value = area.value;
  var lineStart = value.lastIndexOf('\n', start - 1) + 1;
  var lineEnd = value.indexOf('\n', end);
  if(lineEnd === -1) lineEnd = value.length;
  var selected = value.slice(lineStart, lineEnd)
    .replace(/\[\[(CENTRO|JUSTIFICAR)\]\]\n?/g, '')
    .replace(/\n?\[\[\/(CENTRO|JUSTIFICAR)\]\]/g, '');
  var marker = align === 'center' ? 'CENTRO' : 'JUSTIFICAR';
  var wrapped = '[['+marker+']]\n'+selected+'\n[[/'+marker+']]';
  area.value = value.slice(0, lineStart) + wrapped + value.slice(lineEnd);
  area.focus();
  area.selectionStart = lineStart;
  area.selectionEnd = lineStart + wrapped.length;
}

function applyTextSelectionStyle(i, textId, style) {
  var area = document.getElementById(textId);
  if(!area) return;
  var start = area.selectionStart;
  var end = area.selectionEnd;
  if(start === end) {
    alert('Selecione primeiro o trecho do texto que deseja formatar.');
    area.focus();
    return;
  }
  var markers = {
    bold: 'NEGRITO',
    italic: 'ITALICO',
    underline: 'SUBLINHADO'
  };
  var marker = markers[style] || 'NEGRITO';
  var value = area.value;
  var selected = value.slice(start, end)
    .replace(/\[\[(NEGRITO|ITALICO|SUBLINHADO)\]\]/g, '')
    .replace(/\[\[\/(NEGRITO|ITALICO|SUBLINHADO)\]\]/g, '');
  var wrapped = '[['+marker+']]'+selected+'[[/'+marker+']]';
  area.value = value.slice(0, start) + wrapped + value.slice(end);
  area.focus();
  area.selectionStart = start;
  area.selectionEnd = start + wrapped.length;
}

function resetTextBase(i, textId) {
  var area = document.getElementById(textId);

  if(!confirm('Restaurar o texto original deste modelo?')) return;
  localStorage.removeItem(textBaseStorageKey(i));
  area.value = TEXT_BASE_DEFAULTS[i] || '';
  var align = document.getElementById('n'+i+'-align');
  if(align) align.value = 'justify';
  var sign = document.getElementById('n'+i+'-assinatura');
  if(sign) sign.checked = true;
  var headerTitle = document.getElementById('n'+i+'-header-title');
  if(headerTitle) headerTitle.value = '';
  var headerSize = document.getElementById('n'+i+'-header-size');
  if(headerSize) headerSize.value = '13';
  var mainTitleSize = document.getElementById('n'+i+'-main-title-size');
  if(mainTitleSize) mainTitleSize.value = '16';
  var lineSpacing = document.getElementById('n'+i+'-line-spacing');
  if(lineSpacing) lineSpacing.value = '1.75';
}

function actionPlanStorageKey(i) {
  return 'adqpal_plano_acao_'+i;
}

function actionMetaRowHtml(row) {
  row = row || [];
  return '<tr>'+
    '<td class="check-cell"><input type="checkbox" class="row-check"></td>'+
    '<td><input type="text" class="ap-meta-atividade" value="'+escapeHtml(row[0]||'')+'" placeholder="Atividade / Projeto"></td>'+

    '<td><input type="text" class="ap-meta-periodicidade" value="'+escapeHtml(row[3]||'')+'" placeholder="Periodicidade"></td>'+
  '</tr>';
}

function actionCronRowHtml(row) {
  row = row || [];
  var months = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  return '<tr>'+
    '<td class="check-cell"><input type="checkbox" class="row-check"></td>'+
    '<td><input type="text" class="ap-cron-atividade" value="'+escapeHtml(row[0]||'')+'" placeholder="Atividade"></td>'+
    months.map(function(m, idx){
      return '<td class="check-cell"><input type="checkbox" class="ap-cron-month" title="'+m+'" '+(row[idx+1] ? 'checked' : '')+'></td>';
    }).join('')+
  '</tr>';
}

function renderActionPlanTables(i, metaRows, cronRows) {
  var meta = document.getElementById('n'+i+'-meta-body');
  if(meta) meta.innerHTML = (metaRows || PLANO_ACAO_META_ROWS).map(actionMetaRowHtml).join('');
  var cron = document.getElementById('n'+i+'-cron-body');
  if(cron) cron.innerHTML = (cronRows || PLANO_ACAO_CRONOGRAMA_ROWS).map(actionCronRowHtml).join('');
}

function loadActionPlanTables(i) {
  var meta = document.getElementById('n'+i+'-meta-body');
  var cron = document.getElementById('n'+i+'-cron-body');
  if(!meta || !cron || meta.children.length || cron.children.length) return;
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(actionPlanStorageKey(i)) || 'null'); } catch(e) {}
  renderActionPlanTables(i, saved && saved.metaRows ? saved.metaRows : PLANO_ACAO_META_ROWS, saved && saved.cronRows ? saved.cronRows : PLANO_ACAO_CRONOGRAMA_ROWS);
  ['titulo','data','texto','pos-texto'].forEach(function(fieldName){
    var el = document.getElementById('n'+i+'-'+fieldName);
    if(el && saved && typeof saved[fieldName] === 'string') el.value = saved[fieldName];
  });
}

function collectActionMetaRows(i) {
  return Array.prototype.slice.call(document.querySelectorAll('#n'+i+'-meta-body tr')).map(function(tr){
    return [
      (tr.querySelector('.ap-meta-atividade')||{}).value || '',
      (tr.querySelector('.ap-meta-publico')||{}).value || '',
      (tr.querySelector('.ap-meta-quant')||{}).value || '',
      (tr.querySelector('.ap-meta-periodicidade')||{}).value || ''
    ];
  }).filter(function(row){ return row.join('').trim(); });
}

function collectActionCronRows(i) {
  return Array.prototype.slice.call(document.querySelectorAll('#n'+i+'-cron-body tr')).map(function(tr){
    var row = [(tr.querySelector('.ap-cron-atividade')||{}).value || ''];
    Array.prototype.slice.call(tr.querySelectorAll('.ap-cron-month')).forEach(function(chk){
      row.push(chk.checked ? 'x' : '');
    });
    return row;
  }).filter(function(row){ return row.join('').trim(); });
}

function addActionPlanRow(i, type) {
  var body = document.getElementById('n'+i+(type === 'cron' ? '-cron-body' : '-meta-body'));
  if(!body) return;
  body.insertAdjacentHTML('beforeend', type === 'cron' ? actionCronRowHtml(['']) : actionMetaRowHtml(['','','','']));
}

function removeActionPlanRows(i, type) {
  var selector = '#n'+i+(type === 'cron' ? '-cron-body' : '-meta-body')+' .row-check:checked';
  var selected = document.querySelectorAll(selector);
  if(!selected.length) {
    alert('Selecione a linha que deseja remover.');
    return;
  }
  selected.forEach(function(chk){ if(chk.closest('tr')) chk.closest('tr').remove(); });
}

function saveActionPlan(i) {
  localStorage.setItem(actionPlanStorageKey(i), JSON.stringify({
    metaRows: collectActionMetaRows(i),
    cronRows: collectActionCronRows(i),
    titulo: (document.getElementById('n'+i+'-titulo')||{}).value || '',
    data: (document.getElementById('n'+i+'-data')||{}).value || '',
    texto: (document.getElementById('n'+i+'-texto')||{}).value || '',
    'pos-texto': (document.getElementById('n'+i+'-pos-texto')||{}).value || ''
  }));
  saveTextBase(i, 'n'+i+'-texto');

}

function switchTab(i) {
  activeTab = i;
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', Number(b.getAttribute('data-doc-index')) === i);
  });
  document.querySelectorAll('.tab-content').forEach(function(c){
    c.classList.toggle('active', c.id === 'tab-' + i);
  });
  updateSelectedDocTitle();
  fillDefaultTexts();
}

}

function editableHeaderSize(i) {
  var size = parseFloat(f('n'+i+'-header-size'));
  if(!size || size < 8) size = 13;
  if(size > 22) size = 22;
  return size;
}

function editableMainTitleSize(i) {
  var size = parseFloat(f('n'+i+'-main-title-size'));
  if(!size || size < 10) size = 16;
  if(size > 28) size = 28;
  return size;
}

function editableLineSpacing(i) {
  var spacing = parseFloat(f('n'+i+'-line-spacing'));
  if(!spacing || spacing < 1) spacing = 1.75;
  if(spacing > 2.5) spacing = 2.5;
  return spacing;
}

function field(id, label, placeholder, type, full) {
  type = type||'input';
  var cls = full ? 'field full' : 'field';
  if(type==='textarea') return '<div class="'+cls+'"><label>'+label+'</label><textarea id="'+id+'" placeholder="'+placeholder+'"></textarea></div>';
  return '<div class="'+cls+'"><label>'+label+'</label><input type="text" id="'+id+'" placeholder="'+placeholder+'"></div>';
}

function renderTextoBase(texto) {
  var safe = escapeHtml(texto).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines = safe.split('\n');
  var out = [];
  var pendingBlank = 0;
  var contentIndex = 0;
  lines.forEach(function(line){
    var t = line.trim();
    if(!t){
      if(out.length) pendingBlank++;
      return;
    }
    if(pendingBlank){
      out.push(renderPrintSpacer(pendingBlank));
      pendingBlank = 0;
    }
    t = renderTextStyles(t);
    if(/^Naedja Silva Melo|^Representante Legal|^CPF:/i.test(t)){
      return;
    }
    if(contentIndex===0 || /^REQUERIMENTO|^DECLARA[ÇC][ÃA]O|^ANEXO/i.test(t)){
      out.push('<p style="font-weight:700;text-align:center;text-transform:uppercase;margin:10px 0 12px;">'+t+'</p>');
    } else {
      out.push('<p class="p-text" style="line-height:1.85;margin-bottom:12px;">'+t+'</p>');
    }
    contentIndex++;
  });
  return out.join('') + assinaturaDigitalPresidente();
}
function stripAlignMarkers(texto) {

    .replace(/\n?\[\[\/(CENTRO|JUSTIFICAR)\]\]/g, '');
}

function renderTextStyles(texto) {
  return String(texto||'')
    .replace(/\[\[NEGRITO\]\]/gi, '<strong>')
    .replace(/\[\[\/NEGRITO\]\]/gi, '</strong>')
    .replace(/\[\[ITALICO\]\]/gi, '<em>')
    .replace(/\[\[\/ITALICO\]\]/gi, '</em>')
    .replace(/\[\[SUBLINHADO\]\]/gi, '<span style="text-decoration:underline;">')
    .replace(/\[\[\/SUBLINHADO\]\]/gi, '</span>');
}

function renderEstatutoTexto(texto, align) {
  align = align === 'center' ? 'center' : 'justify';
  var safe = escapeHtml(texto).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines = safe.split('\n');
  var currentAlign = align;
  var out = [];
  var pendingBlank = 0;
  lines.forEach(function(line){
    var raw = line.trim();
    if(!raw){
      if(out.length) pendingBlank++;
      return;
    }
    if(pendingBlank){
      out.push(renderPrintSpacer(pendingBlank));
      pendingBlank = 0;
    }
    if(/^\[\[CENTRO\]\]$/i.test(raw)){ currentAlign = 'center'; return ''; }
    if(/^\[\[JUSTIFICAR\]\]$/i.test(raw)){ currentAlign = 'justify'; return ''; }
    if(/^\[\[\/(CENTRO|JUSTIFICAR)\]\]$/i.test(raw)){ currentAlign = align; return ''; }
    var t = raw.replace(/\[\[(CENTRO|JUSTIFICAR)\]\]/gi, '').replace(/\[\[\/(CENTRO|JUSTIFICAR)\]\]/gi, '').trim();
    t = renderTextStyles(t);
    if(/^CAP[IÍ]TULO|^SE[ÇC][ÃA]O|^Dos |^Das |^Do |^Da /i.test(t)){
      out.push('<p style="font-weight:700;text-align:center;margin:14px 0 8px;">'+t+'</p>');
      return;
    }
    out.push('<p style="margin:0 0 8px;text-align:'+currentAlign+';">'+t+'</p>');
  });
  return out.join('');
}

function renderTabelaTexto(tableLines) {
  var rows = tableLines.map(function(line){
    return line.split('|').map(function(cell){ return renderTextStyles(cell.trim()); });
  });
  var maxCols = rows.reduce(function(max, row){ return Math.max(max, row.length); }, 0);
  rows.forEach(function(row){ while(row.length < maxCols) row.push(''); });
  var head = rows.shift() || [];
  var html = '<table class="p-text-table"><thead><tr>'+
    head.map(function(cell){ return '<th>'+cell+'</th>'; }).join('')+
    '</tr></thead><tbody>';
  rows.forEach(function(row){
    html += '<tr>'+row.map(function(cell){ return '<td>'+cell+'</td>'; }).join('')+'</tr>';
  });
  return html+'</tbody></table>';
}

function linhaDeTabelaTexto(line) {
  return ((line || '').match(/\|/g) || []).length >= 2;
}

function renderDocumentoAdministrativo(texto, align) {
  align = align === 'center' ? 'center' : 'justify';
  var safe = escapeHtml(texto).replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines = safe.split('\n');
  var out = [];
  var currentAlign = align;
  var pendingBlank = 0;
  for(var lineIndex = 0; lineIndex < lines.length; lineIndex++){
    var t = lines[lineIndex].trim();
    if(!t){
      if(out.length) pendingBlank++;
      continue;
    }
    if(pendingBlank){
      out.push(renderPrintSpacer(pendingBlank));
      pendingBlank = 0;
    }
    if(/^\[\[CENTRO\]\]$/i.test(t)){ currentAlign = 'center'; continue; }
    if(/^\[\[JUSTIFICAR\]\]$/i.test(t)){ currentAlign = 'justify'; continue; }
    if(/^\[\[\/(CENTRO|JUSTIFICAR)\]\]$/i.test(t)){ currentAlign = align; continue; }
    if(linhaDeTabelaTexto(t)){
      var tableLines = [t];
      while(lineIndex + 1 < lines.length && linhaDeTabelaTexto(lines[lineIndex + 1].trim())){
        tableLines.push(lines[++lineIndex].trim());
      }
      out.push(renderTabelaTexto(tableLines));
      continue;
    }
    t = t.replace(/\[\[(CENTRO|JUSTIFICAR)\]\]/gi, '').replace(/\[\[\/(CENTRO|JUSTIFICAR)\]\]/gi, '').trim();
    if(!t){ continue; }
    t = renderTextStyles(t);
    if(/^►/.test(t)){
      out.push('<p class="p-doc-bullet" style="text-align:'+currentAlign+';">'+t.replace(/^►\s*/,'')+'</p>');
      continue;
    }
    if(/^\d+(\.\d+)?\.\s|^[A-ZÁÉÍÓÚÂÊÔÃÕÇ0-9 .:-]{8,}$/.test(t)){
      out.push('<p class="p-doc-heading">'+t+'</p>');
      continue;
    }
    out.push('<p class="p-doc-paragraph" style="text-align:'+currentAlign+';">'+t+'</p>');
  }
  return out.join('');
}

  preview.innerHTML = html;
  var imgs=preview.querySelectorAll('img');
  var loaded=0,total=imgs.length;
  var printed=false,fallbackTimer=null;
  function printOnce(){
    if(printed)return;
    printed=true;
    if(fallbackTimer)clearTimeout(fallbackTimer);
    window.print();
  }
  function tryPrint(){loaded++;if(loaded>=total)printOnce();}
  if(total===0){printOnce();return;}
  imgs.forEach(function(img){if(img.complete&&img.naturalWidth>0){tryPrint();}else{img.onload=tryPrint;img.onerror=tryPrint;}});
  fallbackTimer=setTimeout(printOnce,2000);
}
