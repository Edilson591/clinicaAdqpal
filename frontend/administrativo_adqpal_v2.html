Proporcionar aos Usuários da ASSOCIAÇÃO bem como seus familiares o atendimento médico com as seguintes especialidades: Assistente Social, Psicólogo, Psiquiátrico, Clinico Geral, Pedagogo, Nutricionista, Fisioterapeuta, entre outros e dando suporte e articulando-os com a rede socioassistencial e da saúde. Atender as famílias em situação de vulnerabilidade social inserida nesta realidade, de modo que procure atender a demanda em situação de risco social e pessoal no qual muitas vezes eles são acometidos, através da entrega de cestas nutricionais, e atendimentos em forma de benefícios sócio assistenciais.

PÚBLICO-ALVO: Os serviços socioassistenciais prestado pela instituição destinam-se às crianças, na faixa etária entre 7 e 12 anos de idade, adolescentes entre 13 e 18 anos de idade incompletos e adultos e suas respectivas famílias em situação de risco pessoal, social, psicossocial e de vulnerabilidade. Destinam-se também as pessoas usuárias de drogas, sejam elas, licitas ou ilícitas, que busquem voluntariamente os serviços prestados ou que são encaminhadas pelas instituições de garantias de direitos, como Conselho Tutelar, Poder Judiciário ou outras instituições.

ATIVIDADE REALIZADA:

Apoio Socioassistencial Atendimento Psicológico, Clinico Geral, Psiquiatra, Nutricional, Assistente Social, Enfermagem, Geriatra, Fisioterapeuta.

Distribuição de cestas básicas às famílias carentes

Reuniões Socioeducativas

Concurso de Cartaz, Jingles e Folder

Oficias Laborterápicas.

2.2 PROJETO: DIGA SIM À VIDA, DIZENDO NÃO ÀS DROGAS

O presente projeto surgiu da necessidade de se falar abertamente sobre as drogas e de trocar e adquirir informação sobre o assunto e promover uma ação preventiva, visto que o número de usuários tem se aumentado de forma assustadora. O uso ilícito de drogas nos últimos anos tem aumentado num ritmo alarmante e ultrapassado todas as fronteiras sociais, económicas, políticas e nacionais. Esse aumento pode ser atribuído a vários fatores, entre os que figuram a falta de informações fidedigna sobre os perigos a longo e curto prazo do consumo de drogas, ao caráter limitado das atividades preventivas (quase que inexistentes em nosso Pais), e a falta de consciência sobre a magnitude do problema dos estupefacientes.

Os problemas do uso indevido de drogas têm sido descritos como um excesso de consciência nos jovens e uma falta de consciência em os adultos.

A prevenção do uso de drogas mediante a sensibilização, a conscientização e a ação são fundamentais para inibir o uso de entorpecentes e a criminalidade associada à mesma. Para aquelas pessoas que se iniciaram indevidamente nas drogas, a educação brinda um

Caminho para uma intervenção e um tratamento com êxito, para sensibilizá-las sobre os risco e perigos do uso continuado de drogas, e lhes ajuda a deixar seu uso.

É necessário promover ações que valorizem a autoestima dos estudantes, que os mantenha ocupados com atividades saudáveis, enriquecendo e atraentes para minar espaços por onde as drogas podem entrar. Mostrar-lhes o quanto são amados e acolhidos pela família, pela escola, pela comunidade, pela sociedade é mais do que dizer não às drogas, é erradicá-las.

PÚBLICO-ALVO: Quem foram as pessoas para as quais a oferta esteve direcionada? É necessário caracterizar o público-alvo, citando dentre outros elementos, a faixa etária, sexo e a escolaridade. Citar a forma de seleção do público, informando se o CRAS ou CREAS encaminha pessoas para o atendimento da entidade;

ATIVIDADE REALIZADA:

Palestras direcionadas aos pais e comunidades (Drogas. Educação Sexual)

Palestras direcionados aos docentes e discentes (Escolas Públicas e Privadas) (Drogas, IST/AIDS)

Culturais, artísticas e Esportes

Físicas e práticas esportivas

QUANTIDADE DE PESSOAS ATENDIDAS: 4.500 atendimentos anual

PERIODICIDADE: A ASSOCIAÇÃO estará funcionando em sua sede, nos seguintes horários. De 2º as 6" feiras das 8h às 12h e das 14h às 18h

RECURSOS HUMANOS: Assistente Social, Psicólogo, Psiquiátrico, Clinico Geral, Nutricionista, Fisioterapeuta, Terapeuta Ocupacional, Geriatria, Endocrinologista.

ABRANGÊNCIA TERRITORIAL

O projeto é desenvolvido incialmente nas escolas públicas e particulares de São Miguel dos Campos, onde serão realizadas as atividades de prevenção e formação de agentes multiplicadores, através das palestras, oficinas, atividades culturais, artísticas e esportivas. Contudo, as atividades de apoio assistenciais, Clínicos, psicológicos serão desenvolvidas na sede da ASSOCIAÇÃO de acordo com a necessidade dos usuários e de seus familiares. Todavia, a sede está aberta diariamente nos horários comerciais para eventuais atendimentos.

RESULTADOS OBTIDOS A PARTIR DA ATIVIDADE REALIZADA

A ASSOCIAÇÃO em 2024 proporcionou momentos de alegria para muitas famílias Miguelenses, em especial de seus usuários, em parceria com alguns comerciantes for possível distribuir cestas básicas às famílias carentes, foram distribuídos também fraldas

Geriátricas aos idoso do abrigo Joana figueiredo de São Miguel dos Campos, distribuição de sopa e pão, enxovais para gestantes, cadeiras de rodas e maletas, garantindo o direito

À cidadania com concessão de documentos civis, proporcionando momentos de descontração com o festival de prémios. Vale ressaltar que o mais importante de tudo isso é poder contribuir para uma sociedade mais justa e solidária, e sobretudo, contribuir com um pouco para ver as pessoas mais felizes.

ORIGEM DOS RECURSOS FINANCEIROS:

Os recursos disponíveis para a realização da ação projeto são oriundos de doações de pessoas físicas e pessoas jurídicas do município e também de eventuais eventos promovidos pela instituição, como bingos, festivais de prêmios, sorteios, e contribuição espontâneas da comunidade. A ASSOCIAÇÃO, buscará firmar com as instituições comerciais e empresas, visando implementar o fluxo de caixa, com a finalidade de melhor execução da ação.

3. PARCERIAS: Parcerias firmadas com Órgãos Municipais como: Assistência Social, Saúde, Esportes, Educação, Cultura, Infância e Juventude, além das Instituições religiosas que disponham a colaborar com o referido projeto.

Parcerias firmadas com Empresas Privadas como:  Santa Casa de Misericórdia de São Miguel dos Campos/Alagoas, Laboratório de Análises Clinicas (CL LABCLIN), Diag (Clínica Médica Avançada), Prefeitura Municipal de São Miguel dos Campos/Alagoas.

4. RESULTADOS OBTIDOS A PARTIR DA ATIVIDADE REALIZADA:

Com a implementação do projeto, foi possível alcançar um amplo público, composto por crianças, adolescentes, adultos, pais, alunos, professores e funcionários da escola, promovendo a conscientização sobre os efeitos devastadores do uso indevido de drogas.

A ação foi cuidadosamente planejada e realizada para envolver todos os Envolvidos na comunidade escolar e fomentar mudanças positivas em atitudes e comportamentos relacionados ao tema.

Etapas Realizadas:

4.1. Sensibilização e Divulgação

A primeira etapa do projeto envolveu uma ampla campanha de sensibilização, utilizando materiais Visuais (cartas, folders e vídeos) e reuniões com a comunidade

Escolar para apresentar os objetivos e a programação das atividades. Essa fase foi essencial para atrair a atenção e engajar os participantes.

4.2. Educação e Conscientização

Foram realizadas palestras educativas e oficinas interativas conduzidas por profissionais especializados em saúde mental, dependência química e educação. Os temas envolvidos incluíram. Os riscos físicos, psicológicos e sociais do uso de drogas.

A importância de uma vida saudável e livre de matéria.

Estratégias para fortalecer a resiliência emocional e lidar com a pressão social.

Durante essas atividades, foram utilizados recursos como apresentações multimídia, dinâmicas de grupo e estudos de caso, o que facilitou a compreensão do tema de maneira acessível e envolvente.

4.3. Fortalecimento das Relações

Uma das metas do projeto foi reduzir barreiras de comunicação entre pais e filhos, bem como entre professores e alunos. Para isso, foram promovidos momentos de diálogo e rodas de conversa mediadas por psicólogos, onde pais e filhos puderam compartilhar experiências, sentimentos e expectativas, criando um ambiente de confiança e apoio mútuo.

4.4. Acompanhamento Psicossocial e Clínico

O projeto ofereceu suporte psicossocial a indivíduos e famílias que buscam ajuda, com a seguinte abordagem:

Atendimentos Individuais: Consultas com psicólogos para avaliar e orientar casos específicos de usuários ou pessoas em situação de risco.

Grupos de Apoio: Sessões em grupo para famílias, envolvem compartilhar experiências e construir uma rede de suporte emocional.

Encaminhamentos: Quando necessário, os participantes foram direcionados para serviços clínicos especializados e programas de reabilitação.

4.5. Capacitação de Educadores e Funcionários

Professores e funcionários participaram de treinamentos específicos para identificar sinais de alerta relacionados ao uso de drogas e atuar como agentes multiplicadores de conscientização dentro da escola.

Resultados Alcançados

Conscientização Ampliada: Alunos, pais e professores relataram maior compreensão sobre os impactos negativos das drogas e uma maior disposição para adotar atitudes preventivas.

Fortalecimento de Laços: Observou-se uma melhoria significativa na comunicação entre pais e filhos e na relação entre professores e alunos, contribuindo para um ambiente escolar mais acolhedor.

Suporte e Encaminhamento: Famílias e indivíduos que enfrentaram dificuldades foram acolhidos, com suporte psicológico e encaminhamentos adequados para tratamento clinico.

Mobilização Comunitária: O projeto promoveu um senso de coletividade e responsabilidade, incentivando a todos a participarem ativamente na construção de um ambiente saudável e seguro.

Impacto Geral

O projeto não apenas aumentou a conscientização sobre os malefícios das drogas, mas também promoveu mudanças significativas na forma como a comunidade escolar e a abordagem familiar do tema. Ao integrar a educação, o apoio psicossocial e o fortalecimento das relações interpessoais, a ação conseguiu gerar impacto positivo na saúde emocional e no bem-estar da comunidade envolvida.

São Miguel dos Campos/AL, Dezembro 2025

Naedja Silva Melo

Art. 8º Pela execução de ações exclusivamente de promoção da saúde voltadas para pessoas com transtornos decorrentes do
uso abuso ou dependência de drogas, desde que comprovem a aplicação de no mínimo 20% (vinte por cento) de suas
receitas em ações gratuidade, em conformidade com o art.8-B da Lei nº 12.101, de 2009;

Art. 9º Pela prestação anual de serviços ao SUS no percentual de 60% (sessenta por cento), em conformidade com ar 4º e 6º
da Lei nº 12.101, de 2009;

Art. 10º A ADQPAL atua de forma integrada e de acordo com a política de Saúde definida pelo SUS, inserindo os serviços
prestado pela Associação na rede de serviços;

Art. 11º A ADQPAL estimula a articulação e as parcerias entre entidades privadas sem finalidade lucrativas e também as
entidades governamentais, visando ao aperfeiçoamento do SUS

Parágrafo único:  A ADQPAL tem a finalidade de prestar serviços de saúde para a população e aquela que lhe for
referenciada pelos órgãos competente do SUS, devendo em especial integrar, de forma complementar, o Sistema Único
de Saúde.

Art. 12º Prestar e promover a assistência à saúde, assistên cia social e a educação, com serviços médicos ambulatoriais a
quantos procurem seus serviços, sem distinção;

                      Art. 13º Prestar assistência por meios de asilos, creches, centros de convivência de idosos, crianças e adolescentes e outra s
atividades que ajudem a comunidade a se realizar;

                         Art. 14º Promover, realizar ou contribuir, por meios próprios ou em parceria com terceiros, com campanhas que tenham
por objetivo ações de promoção, prevenção, precaução e proteção da saúde;

                    Art. 15º Coordenar, defender e representar legalmente os pacientes com a sociedade promovendo, em função deles, e
também de seus familiares e comunidades, sem distinção e discriminação de raça , cor, profissão, nacionalidade, sexo, credo
religioso, orientação sexual ou político por meio dos seguintes programas, entre outros que sirvam às suas finalidades;

Art. 16º  Promoção do princípio da cidadania, garantido a pessoa com deficiência o direito ao acesso a todos os bens e
serviços da sociedade, bem como o respeito pelos direitos civis, políticos, econômicos, sociais e culturais, para o efetivo
exercício da cidadania plena; e o dever de desempenhar um papel ativo no desenvolvimento da sociedade;

Art. 17º Prevenir e proibir a discriminação, direta ou indireta, em razão da deficiência, sob todas as suas formas;

Art. 18º Promoção ao acesso a cuidados médicos gerais e da especialidade de psiquiatria;

Art. 19º Prestação dos cuidados de enfermagem gerais e especializados em saúde mental e psiquiátrico;

Art. 20º Apoio psicossocial, de reabilitação e de integração na comunidade; apoio a familiares e outros cuidadores;

Art. 21º  Promoção de atividades  socioculturais e desportivas em articulação com autarquias, associações culturais,
desportivas e recreativas ou outras estruturas da comunidade;

Art. 22º A reabilitação e autonomia das pessoas com incapacidade psicossocial;

Art. 23º Promoção de uma política global, integral e transversal de prevenção, habilitação, reabilitação e participação da
pessoa com dependência química e psiquiátricos;

Art. 24º  Promoção da igualdade de oportunidade, no sentido de que a pessoa com dependência química e psiquiátrico s
disponha de condições que permitam a plena participação na sociedade

Art. 25º Promoção de uma sociedade para todos através da eliminação de barreiras e da adoção de medidas que visem à
plena participação da pessoa com dependência química.

Art. 26º Atenção ao usuário ou dependente de drogas e aos respectivos familiares, sempre que possível multidisciplinar e
por equipes multiprofissionais;

Art. 27º Respeito ao usuário e ao dependente  de drogas independentemente de quaisquer condições, observados os dire itos
fundamentais da pessoa humana, os princípios e diretrizes do sistema único de saúde e da política nacional de assistência
social;

Art. 28º A prevenção do uso indevido, a atenção e a reinserção social de usuários e dependentes de drogas;

Art. 29º Promover a construção e a socialização do conhecimento sobre drogas no país;

Art. 30º O investimento em alternativas esportivas, culturais, artísticas, profissionais, entre outras, como forma de inclusão
social e de melhoria da qualidade de vida;

Art.31 º A implantação de projetos pedagógicos de prevenção do uso indevido de droga, nas instituições de ensino público
e privado, alinhados às diretrizes curriculares nacionais e aos conhecimentos relacionados a drogas;

Art. 32º Caberá a ADQPAL realizar outras atividades consentâneas com a sua finalidade institucional.

Parágrafo: 1º- A ADQPAL tem como objetivo a prestação de serviços na Saúde, Assistência Social e na Educação, que
promovam o bem-estar individual ou da família, considerada como um todo.

                      Parágrafo :2º É vedada à Associação participar de qualquer atividade política partidária.

CAPITULO III
Do Funcionamento

                      Art. 33º A ADQPAL não distribuirá entre os seus associados, conselheiros, diretores, empregados, doadores, instituidores,
benfeitores ou qualquer outra pessoa física ou jurídica ligadas a ADQPAL, direta ou indiretamente, eventuais vantagens,
excedentes operacionais, brutos ou líquidos, dividendos, bonificações, participações ou parcelas do seu patrimô nio,

auferidos mediante o exercício de suas atividades, e os aplica integralmente na consecução do seu objetivo social
CAPITULO IV Do Patrimônio e da Dissolução
Seção I Do Patrimônio
 Art. 34º O patrimônio da ADQPAL será constituído de bens móveis, imóveis , veículos, semoventes, ações e apólices da
dívida pública.

Parágrafo Único:  Caberá a ADQPAL, celebrar acordos, contratos e convênios, com órgão ou entidades públicas ou
privadas afim de alavancar recursos para o funcionamento do patrimônio.

  Seção V Da Dissolução

Art. 35º No caso de dissolução, aprovada a extinção pela Assembleia geral, convocada especialmente para este fim,
proceder-se-á o levantamento do seu patrimônio, que obrigatoriamente será destinado a outras instituições legalmente
constituídas, qualificadas como organização da sociedade civil de interesse público e sem fins lucrativos, que tenha m
objetivos sociais semelhantes.

Art. 36 º Na hipótese de a  Associação perder a qualificação instituída pela Lei nº 9.790, de 23 de março de 1999, o
respectivo acervo patrimonial disponível, adquirido com recursos públicos durante o período em que perdurou aquela
qualificação, será transferido a outra pessoa jurídica qualificada nos termos desta lei, preferencialmente que tenha o mesmo
objeto social.

Parágrafo Único : É vedada à ADQPAL como organização da Sociedade Civil de Interesse Público, a participação em
campanhas de interesse político partidário ou eleitorais, sob quaisquer meios ou formas.

CAPÍTULO VI
Das Receitas
Art. 37º- As receitas da ADQPAL, necessárias à sua manutenção, serão constituídas por:

I - Contribuições de associados e de terceiros, legados;

II – subvenções E auxílios que venha a receber do Poder Público;

III - doações de qualquer natureza, quaisquer proventos e auxílios recebidos;

IV – Produto líquido de promoções de beneficência;

V – Rendas de emprego de capital ou patrimônio que possua ou venha a possuir;

VI – Auxílio ou recursos provenientes de convênio que venha a receber de entidades públicas e privadas.
Dos Associados
Seção VII
Art. 38º A ASSOCIAÇÃO DOS DEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS PSIQUIÁTRIC AS é
constituída por número ilimitado de associados, dentre pessoas idôneas, maiores de idade, em pleno gozo de seus direitos.
Parágrafo único . Os associados não respo ndem, nem mesmo subsidiariamente, pelas obriga ções e encargos sociais da
ADQPAL.
Art. 37º O quadro social da ADQPAL é constituído pelas seguintes categorias de associados:

a) contribuintes são as pessoas físicas, devidamente cadastradas, que contribuem com a ADQPAL por contribuição mensal,
semestral ou anual em dinheiro, mediante manifestação de vontade em contribuir para a execução dos objetivos da
ADQPAL, firmando termo de adesão de associado;

b) beneméritos, são as pessoas físicas que, a juízo do Cons elho de Administração ou por proposta da Diretoria Executiva,
prestam relevantes serviços à ADQPAL, não tendo direito a voto e não podendo ser votados, salvo se forem também
associados contribuintes;

c) correspondentes, que são aquele s que prestam colabor ação à ADQPAL, porém residem em outros pontos do território
nacional ou em outro país;

 d) honorários, constituindo-se das personalidades nacionais ou estrangeiras que tenham prestado relevantes serviços à causa
da pessoa com deficiência, ou tenham concor rido de maneira apreciável para o progresso da humanidade no campo da

excepcionalidade, e assim se fizeram credores dessa homenagem, apontados por proposta da diretoria à Assembléia Geral,
não tendo direito a voto e não podendo ser votados, salvo se forem também associados contribuintes;

e) fundadores - São as pessoas que participaram da primeira Assembléia Geral de constituição da entidade e assinaram a
respectiva ata, serão consideradas sócias fundadoras.
Seção VIII
Dos Títulos Honoríficos
Art. 39 ºA ADQPAL poderá conceder, em casos especiais, os títulos honoríficos de Agraciado Benemérito e Agraciado
Honorário.

I São Agraciados Beneméritos as personalidades, física ou jurídica, que a juízo do Conselho de Administração ou por
proposta da Diretoria Executi va, hajam contribuído de maneira apreciável para o progresso da instituiçã o filiada ou para a
própria ADQPAL.

II São Agraciados Honorários as personalidades, nacionais ou estrangeiras, que tenham prestado relevantes serviços à causa
da pessoa com deficiê ncia ou tenham concorrido de maneira apreciável para o progresso da humanidade no campo da
deficiência.

III A concessão de título honorífico será deliberada em votação secreta, no mínimo, por dois terços da Diretoria Executiva e
do Conselho de Administração da ADQPAL.

IV O Conselho de Administração e a Diretoria Executiva indicarão uma Comissão de 4(quatro) membros, sendo 2(dois) da
Diretoria Executiva e 2(dois) do Conselho de Administração, para examinar minuciosamente as obras e o "curriculum
vitae", apresentando relatório circunstanciado e conclusivo.

V A concessão de título honorífico não cria obrigação pa ra o agraciado em relação à ADQPAL, nem lhe assegura os
direitos previstos aos associados contribuintes previstos neste Estatuto.

Seção III
Dos Direitos dos Associados
Art. 40º São direitos assegurados aos Associados Contribuintes, quites com suas obrigações sociais:

a) participar das Assembléias Gerais, discutir, votar e ser votado para os cargos da Diretoria Executiva, do Conselho de
Administração e do Conselho Fiscal;

b) propor candidatos à eleição de membros do Conselho de Administração, Conselho Fiscal e da Diretoria Executiva da
ADQPAL;

c) requerer convocação de Assembléia Geral Extraordinária, justificando convenientemente o pedido;

d) participar das reuniões da Diretoria Executiva e do C onselho de Administração da ADQPAL, usando da palavra, mas
sem direito a voto;

e) apresentar à ADQPAL idéias e sugestões, temas para discussão, teses e assuntos de interesse comum;

f) participar de todo s os eventos organizados pela ADQPAL, Conselho Regional, Federação das ADQPAL do Estad o e
Federação Nacional das ADQPAL;

g) requerer a apreciação e aprovação do Conselho de Administração  da Federação Nacional das ADQPAL as propostas de
alteração do Estatuto da ADQPAL.

 h) convocar os órgãos deliberativos da ADQPAL quando houver requerimento de 1/5 (um quinto) dos associados.

§ 1º - Os associados beneméritos, correspondentes, honorários e fundadores não poderão votar nem serem  votados, exceto
se forem também associados contribuintes.

§ 2º - Para gozar de qualquer dos direitos acima enumerados, é necessário que o associado se encontre quite com suas
obrigações sociais.

§ 3º - Os associados contribuintes, quando funcionários da ADQPAL, cedidos ou com víncu lo indireto, não poderão votar
nem serem votados, nem convocar Assembléia Geral Extraordinária.

Seção IV
Das Obrigações dos Associados

Art. 41º São obrigações dos associados da ADQPAL:

a) manter padrão de conduta ética de forma a preservar e aumentar o conceito do Movimento Apaeano no município;

b) pagar as contribuições e prestar todas as informações solicitadas pela Diretoria Executiva;

c) participar de diferentes comissões técnicas, de estudo e de trabalhos, quando convidado e de acordo com sua
disponibilidade;
d) aceitar as incumbências que lhes forem atribuídas pela Diretoria Executiva da ADQPAL, participando de diferentes
comissões técnicas, de estudo e de trabalhos;
e) cumprir, acatar e respeitar as disposições estatutárias, as Resoluções da Dire toria Executiva, as  do Regimento Interno,
bem como as decisões dos órgãos dirigentes da ADQPAL;

f) informar, por escrit o, à Diretoria Executiva da ADQPAL, quando identificar qualquer suspeita de irregularidade no
funcionamento de serviços, para averiguação e providências.
Seção
Das Penalidades Aplicáveis aos Associados
Art. 42 º As infrações ao presente Estatuto e as irregularidades de qualquer natureza cometidas pelos Associados,
acarretarão procedimentos e penalidades aplicados pe la Diretoria Executiva da ADQPAL, nas modalidades de advertência,
suspensão e exclusão.

§ 1º - As penalidades a que se refere o caput do artigo consistem em:

I - Advertência para punir faltas leves conforme sejam definidas e regulamentadas pelo Conselho de Administração, e ser á
aplicada pelo Presidente da ADQPAL;

II - Suspensão, do direito de votar e de  ser votado pelo prazo de 08 (oito) anos para os  cargos de Presidente, Vice -
Presidente, Primeiro e Segundo Diretor Financeiro;

III – Exclusão do quadro social quand o as infrações consistirem em desvio de ética do associado como componente do
corpo social, dos compromissos, padrões de conduta, filosofia, Estatuto, Regulamento e Resoluções da ADQPAL, da
Federação das ADQPAL do Estado e da Federação Nacional das ADQPAL.

§ 2º - A exclusão será deliberada e aplicada pelos membros da Diretoria Executiva, Conselho de Administração e Conselho
Fiscal, com o aval da Assembléia Geral, para punir faltas muito graves.

§ 3º - Em caso de morte o direito do associado não se transfere a terceiros.

§ 4º - Fica assegurado prévio direito de defesa a todos os associados quando lhes forem imputadas infrações contra o
presente Estatuto,  e outras consideradas de natureza grave, cabendo -lhes, ainda, na hipótese de suspensão e exclusão,
recurso sem efeito suspensivo, no prazo de 15 (quinze) dias, a partir da notificação, para a  Assembléia Geral, especialmente
convocada para este fim.

§ 5º - A exclusão considerar-se-á definitiva se o associado não recorrer da penalidade, no prazo previsto no § 4º deste artigo.

§ 6º - O desligamento dar-se-á a pedido do associado, mediante carta dirigida à diretoria da APAE, não podendo ser negado.

Art. 43 º Diante de irregularidades existentes e apuradas pela Comissão de Ética designada pela Diretoria Execut iva da
ADQPAL, o associado será notificado, marcando -se prazo para apresentar a defesa que tiver assegurados a ampla defesa e
o contraditório.

I - O não atendimento pelo associado, aos termos da notificação, o sujeitará aos procedimentos de advertência, suspensão ou
exclusão, decretados pela Diretoria Executiva da ADQPAL "ad referendum" do Conselho de Administração;

II - Conforme a gravidade da falta, da penalidade aplicada poderá decorrer a suspensão do direito de eleger e ser eleito para
os cargos de Presidente, Vice-Presidente, Primeiro Diretor Financeiro e Segundo Diretor Financeiro, durante oito anos, nos
termos do inciso II do artigo 12;

III - Os procedimentos para aplicação das penalidades serão regulamentados no Regimento Interno ou por meio de
Resoluções baixadas pela Diretoria Executiva da ADQPAL "ad referendum" do Conselho de Administração;

IV- O recurso de qualquer penalidade aplicada terá efeito somente devolutivo e será dirigido e apreciado pela Assembléia
Geral Extraordinária.
                                  CAPÍTULO
Da Organização, do Funcionamento e da Administração da ADQPAL

Seção I
Da Organização
Art. 44º São órgãos da ADQPAL, responsáveis por sua administração:

1 – Assembleia Geral

2 – Conselho de Administração

3 - Conselho Fiscal

4 - Diretoria Executiva

5 - Autodefensoria

 6 - Conselho Consultivo

§ 1º - Os membros dos Conselhos de Administração e Fiscal, e os da Diretoria Executiva deve rão ser associados da
ADQPAL há, pelo menos, 1 (um) ano, preferencialmente com experiência e, quites com suas obrigações junto à tesouraria.

§ 2º - O exercício das funções de membros dos órgãos indicados neste artigo, não pode  ser remunerado a qualquer título,
sendo vedada a distribuição de lucros, bonificações, ou de quaisquer outras van tagens ou benefícios, por qualquer forma ou
título, a dirigentes, diretores, conselheiros, associados,  instituidores, benfeitores ou equivalentes, sob qualquer
denominação, forma ou pretexto.

§ 3º - A ADQPAL não distribuirá lucros, resultados, dividendos , bonificações, participações ou parcela de seu patrimônio,
sob nenhuma forma ou pretexto.

§ 4º - Os cargos do Conselho de Administração, do Conselho Fiscal e o da Diretoria Executiva deverão ser ocupados por, no
mínimo, 30% dos associados.
Seção
Da Assembleia Geral
Art. 45º A Assembleia Geral, Ordinária ou Extraordinária, órgão soberano da ADQPAL, será constituída pelos associados
que a ela comparecerem, em pleno gozo de seus direitos estatutários, quites com suas contribuições junto à tesouraria da
ADQPAL.

§ 1º Terão direito de votar nas Assembléias Gerais, os associados contribuintes, há no mínimo, 1 (um) ano, e que estejam
em dia com suas obrigações sociais.

§ 2º  No caso de procuração, o outorgado deverá ser associado da ADQPAL outorgante.

 § 3º Não se admite mais de uma procuração por associado contribuinte.

§ 4º  Instalada a Assembléia Geral pelo Presidente, o mesmo fará a prestação de contas, apresentando o balanço e o relatório
de atividades, secretariado pelo (a) Diretor (a) Secretário (a) da ADQPAL.

§ 5º Uma vez instalada Assembleia Geral e havendo mais de um candidato para os cargos de Presidente e Secretário da
mesma, serão constituídas chapas para votação direta.

§ 6º Em caso de empate, para os cargos de Presidente e Secretário da Assembléia, considerar-se-á eleito o associado há mais
tempo no quadro social da ADQPAL.

§ 7º Em caso de empate para a Diretoria Executiva considerar -se-á eleita a chapa cujo presidente seja associado,
ininterruptamente, há mais tempo no quadro social da ADQPAL.

Art. 46º A convocação da Assembleia Geral far-se-á uma única vez por meio de publicação na imprensa do município da
ADQPAL, e por notificação aos associados e pais, feita através de boletim,  telegrama, circular ou ou tros meios
convenientes, com antecedência de, no mínimo, 8 (oito) dias, admitindo-se, como alternativa, editais afixados nos principais
lugares públicos do município, com a mesma antecedência.

§ 1º No edital de convocação da Assembléia Geral, Ordinária ou  Extraordinária, deverá constar a data, horário, local e a
respectiva ordem do dia.

§ 2º A Assembleia Geral instalar-se-á, em primeira convocação, com a presença da maioria dos associados, e, em segunda
convocação, com qualquer número, meia hora depois, d evendo ambas constar dos editais de convocação, não exigindo a lei
quórum especial.

Art. 47º À Assembleia Geral, órgão soberano da ADQPAL, compete exclusivamente:
a) alterar o Estatuto;

b) decidir sobre a fusão, transformação, dissolução ou extinção da ADQPAL;

c) eleger os membros da Diretoria Executiva, do Conselho de Administração e do Conselho Fiscal;

d) destituir os administradores;

e) aprovar o relatório de atividades e as contas da Diretoria Executiva;

f) verificar a qualificação e proclamar os membros do Conselho Consultivo, na forma estabelecida neste Estatuto;

g) apreciar recursos contra decisões da Diretoria;
h) conceder o título de associado benemérito e honorário, por proposta da Diretoria.

Parágrafo único: As Assembleias Gerais realizar-se-ão, preferencialmente, na sede da ADQPAL.

Art.48º A Assembleia Geral Ordinária reunir-se-á de três em três anos, no mês de novembro, para os fins determinados nas
alíneas “c”, “e” e “f” do artigo 18, com posse no primeiro dia útil de janeiro do ano subsequente.

Art. 49º A Assembléia Geral Extraordinária será convocada pela Diretoria Executiva, sempre que julgar conveniente, ou
quando houver requerimento assinado por, no mínimo, um quinto dos associados em dia com suas obrigações sociais, para
os fins indicados nas alíneas “a”, “b”, “d”, “g” e “h” do artigo 18, ou para tratar de assunto especial, determinado na sua
convocação.
Seção
Do Conselho de Administração
Art. 50º O Conselho de Administração, composto de 05 (cinco) a 15 (quinze) membros, será el eito pela Assembléia Geral
Ordinária, dentre os associados em pleno gozo de seus direitos.
§ 1º O mandato dos membros do Conselho de Administração será de 5 (cinco) anos, permitindo-se a reeleição.

§ 2º  No caso de ocorrer vaga ou impedimento dos membros d o Conselho de Administração, o preenchimento será feito
conforme decisão a ser tomada na primeira reunião do Conselho de Administração que se realizar.

§ 3º O Conselho de Administração reunir-se-á ordinariamente de 06 em 06 meses, obrigatoriamente, ou nos prazos que fixar
o Regimento Interno, e, extraordinariamente, mediante convocação da Diretoria Executiva, ou de, pelo menos, 1/3 (um
terço) de seus próprios membros.

§ 4º As decisões do Conselho de Administração serão tomadas por maioria, com a presença , no mínimo, da terça parte dos
seus membros.

§ 5º Os membros da Diretoria Executiva poderão assistir as reuniões do Conselho de Administração e delas participar, sem
direito a voto.

§ 6º O Presidente e o Diretor Secretário do Conselho de Administração s erão os titulares dos cargos da Diretoria Executiva,

sem direito a voto, exceto o de Minerva, ao Presidente.

Art. 51º Compete ao Conselho de Administração:

a) aprovar o Regimento Interno da ADQPAL;

b) emitir parecer, para encaminhamento à Assembléia Ger al, sobre as contas da Diretoria Executiva, previamente
examinadas pelo Conselho Fiscal;

c) aprovar o Plano Anual de Atividades da ADQPAL, o seu orçamento e as propostas de despesas extraordinárias;

d) examinar o Relatório de atividades da Diretoria Exec utiva, sobre as atividades  e a situação financeira da ADQPAL, em
cada exercício;

e) responder às consultas feitas pela Diretoria Executiva;

f) deliberar, em conjunto com a Diretoria Executiva, sobre os casos omissos neste Estatuto e no Regimento Interno;

g) examinar e deliberar sobre a política de atendimento a pessoa com deficiência no âmbito da APAE;

h) referendar ou não, bem como rever, quando for o caso, penalidades aplicadas pela Diretoria Executiva;

i) aprovar ou não o nome do Procurador Jurídico, indicado pela Diretoria Executiva;

j) preencher as vagas que se verificarem no Conselho de Administração e no Conselho Fiscal, e referendar os nomes para as
vagas na Diretoria Executiva, indicados pela mesma, permanecendo os que desta forma forem invest idos no exercício do
cargo pelo restante do mandato dos substituídos;

k) escolher, através de voto secreto, um nome dentre aqueles apresentados pela Diretoria Executiva como candidatos à
chapa oficial à presidência da ADQPAL;

l) assumir a presidência da ADQPAL, por meio de indicação de três membros, no caso de renúncia ou destituição dos
membros da Diretoria Executiva;

m) convocar, no caso de renúncia ou destituição da Diretoria Executiva, Assembléia Geral Extraordinária, a se realizar em
60 dias, para eleição da Diretoria Executiva;

n) aprovar a alienação ou aquisição de bens imóveis.
                                                              Seção IV
Do Conselho Fiscal
Art. 52º O Conselho Fiscal será eleito pela Assembléia Geral Ordinária, dentre as sociados, há no mínimo, 01 (um) ano,
preferencialmente com experiência administrativa, contábil e fiscal, quites  com suas obrigações sociais, e  compõem-se de 3
(três) membros efetivos e 3 (três) suplentes, com mandato de 3 (três) anos, permitindo-se a reeleição.

§ 1º O mandato do Conselho Fiscal será coincidente com o mandato da Diretoria Executiva.

§ 2º Em caso de vacância, o mandato será assumido pelo respectivo suplente, até seu término.

Art. 53º Compete ao Conselho Fiscal:

I reunir-se no mínimo dua s vezes por ano, examinar e dar parecer sobre as contas  da Diretoria Executiva da  ADQPAL,
deliberando com a presença de seus membros titulares, convocando -se seus suplentes, tantos quantos necessários, no caso
de ausência, renúncia ou impedimento do respectivo titular;
II examinar os livros de escrituração da entidade;

III examinar o balancete semestral apresentado pelo Diretor Financeiro, opinando a respeito;

IV apresentar relatórios de receitas e despesas, sempre que forem solicitados;

V opinar sobre a aquisição e alienação de bens;

VI  promover gestões para o correto funcionamento fiscal da instituição;

VII fornecer, obrigatoriamente, a cada seis meses, relatórios da situação fiscal e sugestões, quando necessário, para prevenir
e corrigir problemas posteriores.

§ 1º O exame das contas deverá ser repetido em caso de vaga do Diretor Financeiro, hipótese em que as contas serão
submetidas à aprovação do Conselho de Administração.

§ 2º  O Conselho Fiscal poderá utilizar -se do assessoramento de um Auditor,  de um Contador ou de um Técnico em
Contabilidade, se assim necessitar.
Seção
Da Diretoria Executiva
Art. 54º A Diretoria Executiva da ADQPAL será composta de, no mínimo:

1 Presidente

2 Vice Presidente

3 1º e 2º Diretores Secretários

4 1º e 2º Diretores Financeiros

5 Diretor de Patrimônio

6  Diretor Social

§ 1º  A Diretoria Executiva será eleita em Assembléia Geral Ordinária, a cada 5 (cinco) anos, convocada especialmente para
este fim.

§ 2º O mandato dos membros da Diretoria Executiva será de 5 (cinco) anos, podendo reeleição.

§ 3º Ao Presidente é permitido concorrer sempre que houver reeleição.

Art.55º A Diretoria Executiva se reunirá no mínimo de 02 em 02 meses, sendo necessária a presença de, pelo menos, cinco
de seus membros, para as deliberações.

§ 1º As deliberações da Diretoria serão tomadas por maioria simples de votos dos membros presentes.

§ 2º O Presidente terá, além do seu, o voto de qualidade nos casos de empate.

Seção
Das Atribuições da Diretoria Executiva

Art. 56º - Compete à Diretoria Executiva:

a) promover e fomentar a realização dos fins da ADQPAL;

b) elaborar o Regimento Interno da ADQPAL, submetê-lo à aprovação do Conselho de Administração da ADQPAL;

c) aprovar a admissão de associados;

d) elab orar e submeter ao Conselho de Administração, até 60 dias do início do exercício, o plano anual/ plurianual de
atividades da APA ADQPAL, o seu orçamento e as propostas de despesas extraordinárias;
e) submeter suas contas ao exame do Conselho Fiscal, encaminhando-as posteriormente ao Conselho de Administração para
parecer, remetendo-as, a seguir, à Assembléia Geral;

f) submeter ao Conselho de Administração o relatório de suas atividades e a situação financeira da  ADQPAL, em cada
exercício;

g) organizar o pl ano de constituição de comissões especiais encarregadas da execução dos fins sociais, designar sede e os
respectivos membros, e supervisionar a atuação das mesmas comissões;

h) criar, prover e desprover os cargos necessários aos serviços técnicos e administrativos;

i) promover campanhas de levantamento de fundos, aprovadas pelo Conselho de Administração;

j) convocar a Assembleia Geral e reuniões do Conselho de Administração;

k) respeitar e fazer respeitar o presente Estatuto da ADQPAL;

L) promover a participação da ADQPAL nas Olimpíadas, Festivais, Congressos e outros eventos;

m) estabelecer procedimentos e diretrizes para aquisição de bens móveis e imóveis, e recebimento de doações, considerando
sempre o custo/benefício e após ouvido o Conselho de Administração;

n) receber doações com encargos e fazer doações, sempre com encargos, após ouvido o Conselho de Administração;

0) indicar ao Conselho de Administração o nome das pessoas que possam ser aprovadas para exercerem o cargo de
Procurador Jurídico e Procurador Adjunto;

p) alienar bens imóveis, observado o disposto no parágrafo 3º deste artigo;

q) estabelecer o valor da contribuição para os associados contribuintes;

r) dar conhecimento ao Conselho de Administração, na primeira reunião deste, das p enalidades aplicadas aos seus
associados;

s) convidar os membros do Conselho Consultivo para participar dos eventos realizados pela APAE.

 § 1º  - O plano anual/plurianual de atividades e o orçamento, de que trata a alínea “d” deste artigo, deverão ser
encaminhados até 60 (sessenta) dias a contar do início do exercício.

§ 2º - A Diretoria Executiva, somente poderá fazer doações, após ouvido o Conselho de Administração, e sempre com
encargos;

§ 3º - A aquisição e alienação de bens de que tratam as alíneas  “n” e “q”, deste artigo, somente será permitida se aprovada
por decisão de, no mínimo, dois terços dos membros do Conselho de Administração.

Seção VII
Das Atribuições dos Membros da Diretoria Executiva

Art. 57º - Compete ao Presidente:

a) assegurar o p leno funcionamento dos serviços da ADQPAL nos seus aspectos legais, administrativos, técnicos e
pedagógicos com o apoio do Conselho de Administração;

b) convocar e presidir a Assembléia Geral, as reuniões do Conselho de Administração, do Conselho Fiscal e da Diretoria
Executiva;

c) representar a ADQPAL, ativa e passivamente, em juízo ou fora dele, perante as entidades de direito público e privado,
com as quais se relacionar;

d) representar a ADQPAL judicialmente, cabendo-lhe impetrar Mandado de Segurança coletivo e outras ações judiciais, em
defesa dos interesses de seus membros ou associados;
e) apresentar ao Conselho de Administração o relatório anual da Diret oria sobre as atividades da ADQPAL, ao fim de cada
ano e, ao término do mandato, à Assembléia Geral;

f) dirigir a ADQPAL, ressalvada a competência do Conselho de Administração, atendendo à perfeita consecução de seus
fins, podendo delegar, parcialmente, suas atribuições;

g) assinar cheques e ordens de pagamento, conjuntamente com o 1º Diretor Fin anceiro ou com o seu substituto estatutário,
no exercício do cargo, para pagamento das obrigações financeiras da entidade;
h) instalar, prov er e supervisionar assessorias e coordenadorias que julgar necessárias, constituindo um colegiado com
concepções, diretrizes e ações unificadas;

i) zelar pelo conhecimento, utilização e aplicação dos Estatutos, Regimentos e regulamentos em vigência, pelos Diretores,
funcionários, técnicos e voluntários;

j) cumprir e fazer cumprir as prescrições deste Estatuto, bem com o as diretrizes estabeleci das no Regimento Interno da
ADQPAL.

Parágrafo único - O Presidente será substituído, em suas faltas, licenças e impedimentos, pelo Vice-Presidente.

Art. 58º - Compete ao Vice-Presidente:

a) substituir o presidente em suas faltas, licenças e impedimentos;

b) exercer funções e atribuições supletivas que lhe forem confiadas.

 Parágrafo único - Em caso de renúncia, destituição ou morte do Presidente, o Vice-Presidente assumirá a Presidência até o
fim do mandato.

Art. 59º - Compete ao 1º Diretor Secretário:

a) secretariar as Assembléias Gerais, as reuniões da Diretoria Executiva e as do Conselho de Administração, redigindo suas
atas em livro próprio;

b) superintender o funcionamento de todos os serviços de secretaria e divulgar as notícias das atividades da ADQPAL;
c) exercer atribuições supletivas que lhe forem confiadas;

d) entregar aos membros da Diretoria Executiva, na primeira reunião do mandato, cópia do Estatuto da ADQPAL;

e) disponibilizar aos associados, na Secretaria, o acesso e leitura do Estatuto da ADQPAL;

f) exercer a presidência da ADQPAL no caso de impedimento temporário, não superior a 06 meses, do Presidente e do
Vice-Presidente.

Parágrafo único - Compete ao 2º Diretor Secretário:

a) substituir o 1º Diretor Secretário nas suas faltas, licenças e impedimentos;

b) assumir o mandato, em caso de vacância, até o seu término;

c) exercer atribuições supletivas que lhe forem confiadas.

Art. 60º - Compete ao 1º Diretor Financeiro:

a) elaborar a previsão orçamentária, semestralmente, e submetê-la à aprovação da Diretoria Executiva;

b) conservar sob sua guarda e responsabilidade os documentos relativos à tesouraria;

c) assinar cheques e/ou ordens de pagamento, conjuntamente com o Presidente, ou com seu substit uto estatutário, para
pagamento das obrigações financeiras da ADQPAL;

d) promover e dirigir a arrecadação da receita social, depositá-la e aplicá-la de acordo com decisão da Diretoria Executiva;

e) fazer pagamentos nos limites ou pela forma estabelecida por decisão da Diretoria Executiva;

f) manter em dia a escrituração da receita e da despesa da ADQPAL, e contabilizá-la sob a responsabilidade de um contador

habilitado;

g) apresentar à Diretoria Executiva os balancetes mensais, o relatório anual sobre a  situação financeira e a prestação de
contas, que deverão ser encaminhados ao Conselho Fiscal para exame e parecer, fornecendo a esses órgãos as informações
complementares que lhe forem solicitadas.

Parágrafo único - Compete ao 2º Diretor Financeiro:

a) substituir o 1º Diretor Financeiro em suas faltas, licenças e impedimentos;

b) assumir o mandato, em caso de vacância, até o seu término;

c) exercer as atribuições supletivas que lhe forem confiadas.

Art. 28 - Compete ao Diretor de Patrimônio:

a) supervisionar, zelar e inventariar o patrimônio da ADQPAL;

b) ter sob sua guarda e responsabilidade os bens patrimoniais da ADQPAL;

c) providenciar a escrituração do material permanente da ADQPAL, mantendo-a em ordem e em dia.

Parágrafo único - O Diretor de Patrimônio poderá contar com o apoio de profissional especializado.

Art. 61º - Compete ao Diretor Social, de acordo com a orientação da Diretoria Executiva:

a) organizar as atividades sociais;

b) elaborar o programa de solenidades;

c) estabelecer normas para o relacionamento do pessoal da ADQPAL com o público;

d) realizar eventos sociais com a finalidade de promover a instituição;

e) promover eventos com a finalidade de arrecadar fundos, após a aprovação da Diretoria Executiva.
Seção
Da Autodefensoria

 Art. 6 2º A autodefensoria é o p rocesso desenvolvido pelas ADQPAL para os familiares, ampliação da participação e
representação da pessoa com deficiência, na gestão institucional e formação de habilidades, autonomia e cidadania.

§ 1º - A eleição dos autodefensores, um do sexo masculino e um do sexo feminino, será realizada, preferencialmente, pelas
pessoas com  deficiência atendidas pela ADQPAL, em Assembléia Geral Ordinária, com mandato de  03 (três) anos,
permitindo-se uma reeleição.

§ 2º - Não sendo possível a eleição dos autodefensores por seus companheiros, caberá a indicação dos 2 (dois) nomes, pelos
membros da Diretoria Executiva e do Conselho de Administração, referendados pela Assembléia Geral Ordinária.

Art. 63º - Compete aos autodefensores:

a) defender os interesses das pessoas com deficiência, sugerindo ações que aperfeiçoem o seu atendimento e participação
em todos os seguimentos da sociedade;

b) participar das reuniões da Diretoria Executiva e do Conselho de Administração opinando sobre assuntos de interesse da
pessoa com deficiência;

 c) participar dos eventos promovidos e organizados pelo movimento Apaeano;

     d) votar e ser votado para autodefensoria.                        Seção
Do Conselho Consultivo

Art.62º O Conselho Consultivo será constituído pelos ex-Presidentes da ADQPAL e tem caráter vitalício.

Parágrafo único - Ocorrendo a eleição de membro do Conselho Consultivo pa ra compor qualquer órgão da ADQPAL , a
sua vaga no Conselho Consultivo será mantida.

Art. 64º A Assembleia Geral verificará a condição e proclamará a investidura do Conselheiro Consultivo no exercício da
função.

Art. 64º - As decisões do Conselho Consultivo são meramente opinativas, não tendo força executiva senão quando acolhidas
pelo Conselho de Administração.

Art. 65º - Compete ao Conselho Consultivo:

a) atuar como órgão moderador na solução de eventuais conflitos que venham a ocorrer no Movimento Apaeano no
município;

b) esclarecer, quando solicitado e possível, fatos e práticas controvertidos ou obscuro s da história do Movimento Apaeano,
com o fim de dar suporte à filosofia do mesmo;

c) zelar pela unidade orgânica, filosófica e programática do Movimento Apaeano;

d) participar, mediante convite, dos eventos realizados pela ADQPAL.

CAPÍTULO
Da Procuradoria Jurídica
Art. 66 º A Procuradoria Jurídica, órgão de assessoramento superior, só poderá ser exercida por pessoa de reconhecida
idoneidade e saber jurídico, inscrita na Ordem dos Advogados do Brasil.

Parágrafo único  O Procurador Adjunto tem a atribuiçã o de substituir o procurador jurídico nas faltas ou impedimentos
deste.

Art. 67º O Procurador Jurídico e o Procurador Adjunto serão investidos nos respectivos cargos ou deles destituídos por
indicação do Presidente da ADQPAL, após aprovação do Conselho de Administração.

Art. 68º O Procurador Jurídico terá assento à mesa nas reuniões da Diretoria Executiva e do Conselho de Administração e
opinará sobre a juridicidade e legitimidade de qualquer matéria discutida, exceto se na mesma concorrer interesse pessoal.

Art. 69º Não constitui falta funcional a manifestação contrária do Procurador Jurídico sobre matéria de sua competência.

Art. 70º Compete ao Procurador Jurídico:

a) atuar na defesa dos direitos das pessoas com deficiência;

b) defender os interesses  da ADQPAL, em juízo ou fora dele, mediante expresso mandato do Presidente ou de seu
substituto legal;

c) elaborar, examinar, e visar minutas de contratos e convênios;

d) emitir parecer sobre ma téria de interesse geral da ADQPAL, pronunciando-se, ao final de cada assunto, nas reuniões de
Diretoria, sobre a legalidade das proposições e a observância deste Estatuto e do Regimento Interno;

e) representar juridicamente a entidade junto às repartições públicas e privadas;

f) pesquisar, compilar e sugerir legislação pertinente à pessoa com deficiência;

g) manter intercâmbio jurídico e dar interpretação final sobre matéria controvertida;

h) dirigir os serviços da Procuradoria da ADQPAL.
CAPÍTULO
Das Receitas
Art. 71º As receitas da ADQPAL, necessárias à sua manutenção, serão constituídas por:

I contribuições de associados e de terceiros;

II legados;

III subvenções e auxílios que venha a receber do Poder Público;

IV doações de qualquer natureza;

V  quaisquer proventos e auxílios recebidos;

VI produto líquido de promoções de beneficência;

VII rendas de emprego de capital ou patrimônio que possua ou venha a possuir;

VIII  auxílio ou recursos provenientes de convênio que venha a receber de entidades públicas e privadas.

As despesas regulares serão orçadas e atualizadas pela diretoria e nestas incluem:

Folha de pagamento de empregados;

Encargos sociais pertinentes;

Serviços contábeis;

Serviços jurídicos;

Assessoria de imprensa;

Compra de material de expediente;

Compra de material de limpeza;

Aluguéis;

Água, luz, telefone e impostos incidentes;

Pagamento a terceiros para realização de serviços necessários;

Outras previstas através de Assembléia Geral Ordinária ou Extraordinária.

Parágrafo único – Essas rendas, recursos e eventual resultado opera cional serão aplicados integralmente na manutenção e
desenvolvimento dos objetivos institucionais, no território nacional.

Art. 72º O patrimônio da ADQPAL será constituído de bens móveis, imóveis, veículos, semoventes, ações e apólices da
dívida pública.

Parágrafo único No caso de dissolução ou extinção da ADQPAL as receitas e o patrimônio social reverterão em benefício
de entidades congêneres, com personalidade jurídica,  registradas no Conselho Nacional de Assistência Social – CNAS ou a
entidade pública.
CAPÍTULO VI
Das Eleições
Art. 73º De cinco em cinco anos, serão eleitos pela Assembléia Geral Ordinária os membros da Diretoria Executiva, do
Conselho de Administração e do Conselho Fiscal.

Parágrafo único  A eleição será realizada por votação secreta,  sendo permitida por aclamação, quando se tratar de chapa
única.

Art. 74º A eleição da Diretoria Executiva,  do Conselho de Administração e do Conselho Fiscal será precedida de edital de
convocação, publicado no mínimo 30 (trinta) dias antes da Assembléia Geral Ordinária.

§ 1º  A inscrição das chapas candidatas deverá ocorrer na Secre taria da ADQPAL até 20 dias antes da eleição, que se
realizará dentre as chapas devidamente inscritas e homologadas pela comissão eleitoral.

 § 2º Somente poderão integrar as  chapas os  concorrentes associados da ADQPAL há pelo menos 1 (um) ano,
preferencialmente com experiência diretiva e quites com suas obrigações junto à tesouraria da ADQPAL.

§ 3º São inelegíveis simultânea, sucessiva ou alternadamente para os cargos de Pre sidente, Vice-presidente e Diretores
Financeiros, para a Diretoria Executiva da ADQPAL: cônjuge, companheiro, parentes consangüíneos ou afins até o 1º grau,
funcionários quando no exercício do cargo ou cedidos.

 § 4º Os candidatos a Presidente, Vice -Presidente e Diretores Financeiros deverão apresentar no ato da inscrição da chapa
cópias autenticadas ou originais dos seguintes documentos: Carteira de Identidade, CPF, declaração de bens móveis e
imóveis, certidões negativas criminais, certidão de regularid ade do CPF, ficha de filiação de associado da ADQPAL, cópia
do parecer favorável da prestação de contas do Conselho Fiscal e da ata de aprovação da última gestão, no caso de
candidato à reeleição, declaração sob as penas da lei de não ser inelegível, nos t ermos do parágrafo 6º deste artigo, devendo
um dos três candidatos manter seu domicílio no município sede da ADQPAL.

§ 5º  É vedada a acumulação de cargos por  membro do Conselho de Administração, Conselho Fisc al e Diretoria Executiva
da ADQPAL.

§ 6º  É vedada a participação de funcionários da ADQPAL na Diretoria Executiva, Conselho de Administração e Conselho
Fiscal, ainda que cedidos ou com vínculo empregatício direto ou indireto.

Art. 75º O registro de chapas e os demais trabalhos da eleição serão e xaminados e conduzidos pela Comissão Eleitoral
instituída pela ADQPAL por meio de Resolução e regulados pelo Regimento Interno da mesma.

Art. 7 6º A eleição será realizada, de cinco em cinco anos, na primeira quinzena do mês de novembro, e a posse dos
membros eleitos ocorrerá no 1º dia útil do mês de janeiro do ano seguinte.
CAPÍTULO
Disposições Gerais

   Art. 77º Toda proposta para alteração do presente Estatuto só poderá ser apresentada em Assembléia Geral Extraordinária
convocada com, pelo menos, 30 (trinta) dias de antecedência, na forma do artigo 17, com aprovação prévia da ADQPAL

Parágrafo único - Toda proposta de alteração estatutária deverá ser entregue e protocolada na Secretaria da ADQPAL, com
antecedência mínima de 180 (cento e oitenta) dias que antecederem a instalação da Assembléia Geral Extraordinária para tal
fim convocada, sem o que não será apreciada.

Art. 78º - A extinção, fusão, transformação, ou alteração do nome da  ADQPAL somente poderá ser feita se determinada e
aprovada por deliberação de 2 (duas) Assembléias Extraordinárias sucessivas, realizadas com intervalo de 90 (noventa) dias,
instaladas com a presença de, no mínimo dois terços dos associados, em dia com as obrigações sociais, e de representantes
da ADQPAL, sem o que suas deliberações não terão validade.

§2º É vedada a extinção, fusão ou transformação  da ADQPAL quando houver denúncia de irregularidade protocol ada na
ADQPAL

Art. 79º Os casos omissos no presente Estatuto serão decididos pela reunião conjunta da Diretoria Exec utiva e Conselho de
Administração, com força estatutária no que não colidir com este Estatuto, aplicando-se subsidiariamente o Código Civil.

Art.80º O presente Estatuto entra em vigor a partir de sua aprovação pela Assembléia Geral Extraordinária,  e respectivo
registro em cartório, devendo a Diretoria Executiva providenciar a sua divulgação.`;

var activeTab = 0;

// GERA ABAS
function normalizeText(value) {
  return String(value || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function updateSelectedDocTitle() {
  var el = document.getElementById('selected-doc-title');
  if (el) el.textContent = DOCS[activeTab] || 'Documento';
}

function filterDocuments(query) {
  var q = normalizeText(query);
  var total = 0;
  document.querySelectorAll('.doc-group').forEach(function(group) {
    var groupHits = 0;
    group.querySelectorAll('.tab-btn').forEach(function(btn) {
      var match = !q || (btn.getAttribute('data-search-text') || '').indexOf(q) !== -1;
      btn.style.display = match ? '' : 'none';
      if (match) {
        groupHits++;
        total++;
      }
    });
    group.style.display = groupHits ? '' : 'none';
  });
  var countEl = document.getElementById('doc-count');
  if (countEl) countEl.textContent = total === 1 ? '1 documento encontrado' : total + ' documentos encontrados';
  var emptyEl = document.getElementById('empty-filter');
  if (emptyEl) emptyEl.style.display = total ? 'none' : 'block';
}

function buildTabs() {
  var tabsEl = document.getElementById('tabs');
  var contentsEl = document.getElementById('tab-contents');
  tabsEl.innerHTML = '';
  contentsEl.innerHTML = '';

  DOCS.forEach(function(d, i) {
    var div = document.createElement('div');
    div.className = 'tab-content' + (i===0?' active':'');
    div.id = 'tab-' + i;
    div.innerHTML = commonTitleField(i, d) + buildForm(i);
    contentsEl.appendChild(div);
  });

  DOC_GROUPS.forEach(function(group) {
    var groupEl = document.createElement('div');
    groupEl.className = 'doc-group';

    var titleEl = document.createElement('div');
    titleEl.className = 'doc-group-title';
    titleEl.textContent = group.title;
    groupEl.appendChild(titleEl);

    var listEl = document.createElement('div');
    listEl.className = 'doc-group-list';
    group.docs.forEach(function(i) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tab-btn' + (i===0?' active':'');
      btn.setAttribute('data-doc-index', i);
      btn.setAttribute('data-search-text', normalizeText(DOCS[i] + ' ' + group.title + ' ' + (DOC_ALIASES[i] || '')));
      btn.innerHTML = ICONS[i] + ' ' + DOCS[i];
      btn.onclick = function() { switchTab(i); };
      listEl.appendChild(btn);
    });

    groupEl.appendChild(listEl);
    tabsEl.appendChild(groupEl);
  });

  updateSelectedDocTitle();
  filterDocuments('');
}


var PROJETO_CULTURAL_ADQPAL_BASE = "ESTADO DE ALAGOAS\n\nASSOCIAÇÃO DOS DEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS PSIQUIÁTRICAS DE SÃO MIGUEL DOS CAMPOS\n\nPROJETO ARTE DE INTEGRAR COM OFERTA DE CURSOS ARTÍSTICOS AOS DEPENDENTES QUÍMICOS E PORTADORES DE TRANSTORNOS MENTAIS E ÀS SUAS FAMÍLIAS RESIDENTES NO MUNICÍPIO DE SÃO MIGUEL DOS CAMPOS\n\nSÃO MIGUEL DOS CAMPOS/AL, 14 DE OUTUBRO DE 2024\n\nPROJETO ARTE DE INTEGRAR COM OFERTA DE CURSOS ARTÍSTICOS AOS DEPENDENTES QUÍMICOS E PORTADORES DE TRANSTORNOS MENTAIS E ÀS SUAS FAMÍLIAS RESIDENTES NO MUNICÍPIO DE SÃO MIGUEL DOS CAMPOS\n\nMARIA EDINEIDE DOS SANTOS\nPresidente da Instituição\nCPF: 049.154.324-75\nEmail da Presidente: Leeyde1813@gmail.com\nEmail: associacaoadqpaloficial@gmail.com\nContato: (82) 9.9367-1161\nContato: (82) 9.9163-6096\n\nSÃO MIGUEL DOS CAMPOS/AL, 14 DE OUTUBRO DE 2024\n\nINSTITUIÇÃO PROPONENTE\n\nASSOCIAÇÃO DOS DEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS PSIQUIÁTRICAS DE SÃO MIGUEL DOS CAMPOS\nCNPJ: 16.920.069/0001-73 - MATRIZ\nEndereço: Praça Dr. José Inácio, nº 173, Centro, São Miguel dos Campos/AL, CEP: 57241-234\nCorreio Eletrônico da Instituição: associacaoadqpaloficial@gmail.com\n\nDADOS DO PROJETO\n\nNOME: Arte de Integrar\nOrigem do recurso: Ministério da Cultura\nVALOR TOTAL: R$ 450.000,00 (Quatrocentos e cinquenta mil reais)\nÁrea geográfica abrangida: São Miguel dos Campos/Estado de Alagoas\n\nSÃO MIGUEL DOS CAMPOS/AL, 14 DE OUTUBRO DE 2024\n\nAPRESENTAÇÃO\n\nOferta de cursos artísticos para pacientes atendidos pela Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátricas do Município de São Miguel dos Campos, para promover a sociabilidade, o empoderamento, reintegração social e geração de renda.\n\nAs ações ocorrerão na sede da Associação e ofertarão cursos de pintura em tela, camisas, bolsas e outros materiais.\n\nOBJETIVO GERAL\n\nPromover cursos artísticos de pintura para pacientes atendidos pela Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátricas do Município de São Miguel dos Campos.\n\nOBJETIVOS ESPECÍFICOS\n\nAdaptação do espaço físico da Associação para a oferta do curso; garantir a sociabilidade, o empoderamento e reintegração social dos pacientes.\n\nPromover a arte e cultura como vetor de desenvolvimento social e econômico.\n\nJUSTIFICATIVA\n\nAtividades artísticas vêm sendo empregadas em instituições de diversos países como recurso terapêutico e têm sido destaque entre as ações oferecidas nos Centros de Atenção Psicossocial (CAPS).\n\nA Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátricas/ADQPAL atua no Município de São Miguel dos Campos desde 2012, com atividades de assistência psicossocial para portadores de distúrbios psiquiátricos, deficiência mental e dependentes químicos. Também oferta diversos tipos de exames e consultas com várias especialidades assistenciais gratuitas, garantindo à população de baixa renda o direito à saúde.\n\nPÚBLICO ALVO\n\nPacientes atendidos pela Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátricas do Município de São Miguel dos Campos.\n\nETAPAS DE TRABALHO\n\nPRÉ-PRODUÇÃO\n\nAdaptação do espaço físico.\nContratação de profissionais.\nDivulgação do projeto.\n\nPRODUÇÃO\n\nInício das aulas.\n\nPÓS-PRODUÇÃO\n\nEncerramento e entrega dos certificados.\nElaboração do relatório de execução.\n\nCRONOGRAMA\n\nEtapas | Data de Início | Data de Encerramento\nPré-produção | 1º mês | 2º mês\nProdução | 3º mês | 9º mês\nPós-produção | 10º mês | 12º mês";
var PROJETO_ESPORTE_ACAO_BASE = "Oficio n° 54/2023\n\nSão Miguel dos Campos-AL,15 de Julho de 2024\n\nAO MINISTÉRIO DO ESPOTE,\n\nNa oportunidade, Venho apresentar a Associção dos Dependentes Quimicos e Portadores de Doençcas Psiquiatricas de São Miguel dos Campos/AL, com CNPJ sob n° 16.920.069/0001-73, qualificada como Utilidade Pública Municipal com a Lei nº 1.383, de 15 de abril de 2014, e pelo título de Utilidade Pública estadual com a Lei nº 7.571, de 18 de dezembro de 2013, e cadastrada no CNES com nº 9033459 no (MS), no rol das entidades Beneficentes. Vem solicitar deste Ministério à A liberação de Recursos para a IMPLANTAÇÃO DO PROJETO ESPORTIVO ( ESPORTE EM AÇÃO ), NO Municipio de São Miguel dos Campos/AL. Considerando, que ainda nossa Associação não recebe recursos Publicos: Federal, Estadual e Municipal, e temos uma grande demanada que necessita desses serviços.\n\nConsiderando, que ainda nossa Associação não recebe recursos Publicos: Federal, Estadual e Municipal.\n\nPor tanto, na certeza de contar com vosso pronto atendimento, desde já agradecemos e colocamo-nos a sua disposição para trabalharmos em prol do nosso Municipio de São Miguel dos Campos-AL.\n\nAtenciosamente,";
var PROJETO_CIDA_MINISTERIO_ESPORTE_BASE = "PROJETO CIDA\n\nO Projeto Cida será um ambiente escolar com acessibilidade para desenvolver a garantia da inclusão educacional das pessoas com deficiência físicas, sensoriais ou intelectuais, de modo a promover o acesso à educação de qualidade e o desenvolvimento pessoal e social dessas pessoas.\n\nO público-alvo para o projeto de ensino para pessoas com deficiência são indivíduos que apresentam diferentes tipos de deficiência, tais como:\n\nDeficiência física: Pessoas com limitações físicas, tais como paraplegia,\n\ntetraplegia, amputação, paralisia cerebral e distrofia muscular.\n\nDeficiência sensorial: Pessoas com limitações sensoriais, tais como deficiência\n\nvisual, auditiva ou surdocegueira.\n\nDeficiência intelectual: Pessoas com limitações intelectuais, tais como a síndrome\n\nde Down, autismo, entre outras.\n\nAlém disso, o projeto vai ser direcionado tanto para crianças e jovens em idade escolar quanto para adultos que desejam concluir ou continuar seus estudos. É importante ressaltar que este projeto de ensino, também vai considerar as necessidades específicas de cada tipo de deficiência, de modo a garantir o acesso à educação de qualidade e a inclusão social.\n\nJUSTIFICATIVA\n\nA criação do Projeto Cida é fundamental para garantir a inclusão social e educacional das pessoas com deficiência. Existem diversas razões pelas quais a criação desse projeto é importante, incluindo:\n\nDireito à educação: Toda pessoa tem o direito à educação, independentemente de suas limitações físicas, sensoriais ou intelectuais. Portanto, é importante criar projetos de ensino para garantir que todas as pessoas com deficiência tenham acesso à educação de qualidade.\n\nDesenvolvimento pessoal e social: O ensino oferece oportunidades para que as pessoas com deficiência desenvolvam suas habilidades pessoais e sociais. Isso pode melhorar sua autoestima, autoconfiança e independência, além de aumentar a participação na sociedade.\n\nInclusão social: A educação é um importante meio de inclusão social. Ao participar de projetos de ensino, as pessoas com deficiência têm a oportunidade de interagir com seus pares, fazer novas amizades e se sentir parte da comunidade.\n\nEmpoderamento: A educação é uma ferramenta poderosa para o empoderamento. Ao adquirir conhecimentos e habilidades, as pessoas com deficiência podem se tornar mais autônomas e tomar decisões informadas em suas vidas.\n\nBenefício para a sociedade como um todo: A educação para pessoas com deficiência não beneficia apenas os indivíduos em questão, mas também a sociedade como um todo. Pessoas com deficiência que são educadas e têm habilidades para o trabalho podem contribuir para o crescimento econômico e a inovação, além de promover a diversidade e a inclusão no ambiente de trabalho e na sociedade em geral.\n\nEm síntese, a criação do Projeto Cida é fundamental para garantir a inclusão e a igualdade de oportunidades. Como a educação é um direito humano básico, ela deve ser acessível a todas as pessoas, independentemente de suas limitações, no entanto ela não tem sido.\n\nTornando imprescindível a criação e desenvolvimento deste projeto.\n\nBENEFÍCIOS\n\nO Projeto Cida não beneficiará apenas as pessoas com deficiência diretamente envolvidas, mas também suas famílias e amigos. Porque quando as pessoas com deficiência recebem uma educação de qualidade e acessível, suas famílias e amigos também podem se beneficiar de várias maneiras, como:\n\nRedução do estigma e preconceito: a educação pode ajudar a reduzir o estigma e preconceito em relação às pessoas com deficiência, tornando a sociedade mais inclusiva e acolhedora.\n\nMelhoria na qualidade de vida: a educação pode ajudar as pessoas com\n\ndeficiência a adquirir habilidades e conhecimentos valiosos, que podem melhorar sua qualidade de vida e permitir que elas alcancem seus objetivos pessoais e\n\nprofissionais.\n\n3. Aumento da conscientização sobre a deficiência: a educação pode ajudar a\n\naumentar a conscientização e compreensão sobre a deficiência entre familiares e amigos, tornando-os mais informados e capacitados a apoiar as pessoas com deficiência em suas vidas.\n\n4. Melhoria na saúde mental: a educação pode ajudar a melhorar a saúde mental de pessoas com deficiência, bem como de seus familiares e amigos, fornecendo um senso de propósito e realização.\n\nFUNDAMENTAÇÃO\n\nÉ importante lembrar que o Brasil como signatário de programas internacionais e a legislação brasileira estabelece que a inclusão das pessoas com deficiência é um direito garantido, e cabe aos governos e à sociedade em geral garantir o acesso a serviços e\n\nrecursos que permitam o exercício desse direito. Dessa forma, é notório que existem diversas leis e políticas que fundamentam a necessidade e a importância da criação do Projeto Cida. Algumas delas são:\n\nNO ÂMBITO INTERNACIONAL\n\nO Projeto Cida contribui significativamente para o cumprimento de vários objetivos da Agenda 2030 para o Desenvolvimento Sustentável, que é um plano de ação global adotado pela Organização das Nações Unidas (ONU) em 2015 para acabar com a pobreza, proteger o planeta e garantir a prosperidade para todos.\n\nEm particular, o Projeto Cida contribuirá para o cumprimento dos seguintes objetivos:\n\nObjetivo 4: Educação de qualidade: Ao oferecer uma educação de qualidade para pessoas com deficiência, o projeto está contribuindo para garantir o acesso à educação para todos e promover a igualdade de oportunidades.\n\nObjetivo 10: Redução das desigualdades: ao promover a inclusão de pessoas com deficiência na sociedade, o projeto está contribuindo para reduzir as desigualdades sociais e econômicas.\n\nObjetivo 11: Cidades e comunidades sustentáveis: ao promover a acessibilidade e inclusão de pessoas com deficiência, o projeto está contribuindo para criar cidades mais inclusivas, seguras, resilientes e sustentáveis.\n\nObjetivo 17: Parcerias e meios de implementação: ao promover a parceria entre diferentes setores da sociedade, incluindo organizações da sociedade civil, empresas e governo, o projeto está contribuindo para fortalecer a capacidade de implementação da Agenda 2030.\n\nNO ÂMBITO FEDERAL\n\nConstituição Federal de 1988: A Constituição Federal brasileira estabelece a igualdade de direitos entre todos os cidadãos, incluindo as pessoas com deficiência. Dessa forma, é garantido o direito à educação para todos, sem qualquer tipo de discriminação.\n\nLei nº 13.146/2015 (Estatuto da Pessoa com Deficiência): Esta lei, conhecida como Lei Brasileira de Inclusão, estabelece diretrizes para a promoção da inclusão das pessoas com deficiência em diversos aspectos da vida social, incluindo o acesso à educação. O Estatuto da Pessoa com Deficiência prevê que as políticas públicas devem garantir a inclusão educacional das pessoas com deficiência, oferecendo recursos e serviços necessários para essa finalidade.\n\nLei nº 7.853/1989: Esta lei estabelece medidas de proteção e integração social das pessoas com deficiência. Ela prevê a promoção de ações que garantam o pleno exercício dos direitos individuais e sociais das pessoas com deficiência, incluindo o direito à educação.\n\nDecreto nº 5.296/2004: Este decreto regulamenta as normas de acessibilidade no\n\nBrasil e estabelece diretrizes para a promoção da acessibilidade em diferentes aspectos da vida social, incluindo a educação. O decreto prevê a obrigatoriedade de garantir a acessibilidade nas instituições de ensino, por meio de adaptações físicas e tecnológicas, para que as pessoas com deficiência possam ter acesso aos espaços e aos conteúdos educacionais.\n\nNO ÂMBITO ESTADUAL\n\nAlém das leis federais, o Estado de Alagoas também possui normas específicas que fundamentam a necessidade e a importância da criação do Projeto Cida. Algumas dessas leis são:\n\nLei nº 6.154/2000: Esta lei dispõe sobre a política estadual de atendimento aos portadores de deficiência, definindo diretrizes para a promoção da inclusão social, educacional e profissional das pessoas com deficiência no estado de Alagoas.\n\nLei nº 6.328/2002: Esta lei estabelece normas para a instalação de equipamentos e\n\nestruturas acessíveis para pessoas com deficiência em estabelecimentos comerciais, públicos e privados no estado de Alagoas, incluindo instituições de ensino.\n\nLei nº 6.376/2003: Esta lei institui o Conselho Estadual de Defesa dos Direitos da\n\nPessoa com Deficiência no estado de Alagoas, com o objetivo de promover a proteção e a defesa dos direitos das pessoas com deficiência.\n\nLei nº 7.080/2015: Esta lei institui a Política Estadual de Educação Especial na perspectiva da Educação Inclusiva no estado de Alagoas, definindo diretrizes para a promoção da inclusão educacional das pessoas com deficiência.\n\nEssas são algumas das leis estaduais de Alagoas. É importante ressaltar que a legislação deve ser seguida para garantir o acesso e a inclusão de todas as pessoas, independentemente de suas condições.\n\nNO ÂMBITO MUNICIPAL\n\nUma das leis municipais que pode fundamentar a necessidade do Projeto Cida é a Lei Municipal nº 1.262/2017, que dispõe sobre a Política Municipal de Educação Especial na perspectiva da Educação Inclusiva no município de São Miguel dos Campos. Essa lei estabelece diretrizes e normas para a inclusão das pessoas com deficiência no sistema educacional do município, garantindo o acesso à educação de qualidade em igualdade de condições com os demais estudantes.\n\nAlém dessa lei, existem outras normas municipais que podem apoiar a criação do Projeto\n\nCida, como a Lei Municipal nº 1.278/2018, que institui o Conselho Municipal de Direitos da Pessoa com Deficiência, e a Lei Municipal nº 1.371/2019, que dispõe sobre a obrigatoriedade de acessibilidade em edifícios públicos e privados no município.\n\nEssas leis municipais demonstram o compromisso da cidade de São Miguel dos Campos em promover a inclusão e a igualdade de oportunidades para todas as pessoas, independentemente de suas condições. A partir dessas normas, torna-se evidente que o Projeto Cida é fundamental e necessário.\n\nIMPACTO SOCIAL\n\nA educação é um direito humano fundamental e essencial para a inclusão social e a promoção da igualdade. O acesso à educação de qualidade é especialmente importante para pessoas com deficiência, que muitas vezes enfrentam barreiras e discriminação na sociedade.\n\nAo fornecer uma educação acessível e de qualidade para pessoas com deficiência, o\n\nProjeto Cida pode ajudar a promover a igualdade e a inclusão social. Isso pode levar a um\n\noportunidades de emprego e melhores condições econômicas. Além disso, a educação pode ajudar as pessoas com deficiência a desenvolver habilidades e conhecimentos valiosos, que podem melhorar sua qualidade de vida e permitir que elas alcancem seus objetivos pessoais e profissionais.\n\nO projeto também reduzirá o preconceito e melhorará a qualidade de vida de pessoas com deficiência, bem como seus familiares e amigos.\n\nA cidade de São Miguel dos Campos pode se beneficiar de diversas maneiras com a implementação de um projeto de ensino para pessoas com deficiência. Em primeiro lugar, a cidade pode ser vista como uma cidade mais inclusiva e acessível, o que pode melhorar a imagem da cidade e atrair mais visitantes, turistas e investidores. Além disso, o projeto pode ajudar a aumentar a taxa de empregabilidade de pessoas com deficiência, o que pode ter um impacto positivo na economia local, uma vez que essas pessoas se tornam mais produtivas e atuantes na comunidade.\n\nTambém pode haver um impacto social positivo na comunidade como um todo, uma vez que as pessoas com deficiência terão mais oportunidades de desenvolvimento pessoal e\n\nprofissional, o que pode melhorar a autoestima, a autoconfiança e o bem-estar emocional.\n\nPor fim, a implementação do Projeto Cida pode ajudar a promover uma cultura de inclusão e respeito à diversidade na cidade, o que pode ter um efeito cascata positivo em outras áreas e setores da sociedade.\n\nMETODOLOGIA\n\nA metodologia do Projeto Cida vai ser baseada em uma abordagem inclusiva e centrada no indivíduo, no qual contemplará as necessidades específicas de cada tipo de deficiência. O uso das tecnologias assistivas e recursos pedagógicos adaptados para cada tipo de deficiência será fundamental para garantir o sucesso do projeto. Além disso, serão envolvidos profissionais capacitados em educação especial e inclusiva, para que possam oferecer suporte e orientação adequados para os alunos com deficiência.\n\nESTRATÉGIA DE ENSINO\n\nO Projeto Cida terá como estratégias de ensino, entre outras, a adoção das seguintes processos:\n\nPersonalização do ensino: a estratégia de personalização do ensino é fundamental para atender às necessidades específicas de cada tipo de deficiência. Isso inclui a adaptação de recursos pedagógicos, como materiais didáticos e tecnologias assistivas, e a utilização de metodologias que promovam a participação ativa do aluno.\n\nInclusão de tecnologias assistivas: o uso de tecnologias assistivas, como\n\nsoftwares de leitura, lupa eletrônica, teclado virtual, entre outros, é essencial para garantir o acesso à educação e a inclusão social de pessoas com deficiência.\n\nDesenvolvimento de habilidades socioemocionais: o projeto de ensino deve\n\ncontemplar o desenvolvimento de habilidades socioemocionais, como a autoestima, a autoconfiança e a resiliência. Essas habilidades são importantes para o desenvolvimento pessoal e social dos alunos com deficiência, além de contribuírem para o seu sucesso acadêmico.\n\nFormação de parcerias: é importante estabelecer parcerias com instituições e profissionais que atuam na área da inclusão de pessoas com deficiência, para que possam contribuir com a formação e capacitação dos professores e demais profissionais envolvidos no projeto.\n\nÉ importante salientar que o projeto será constantemente avaliado e adaptado de acordo com as necessidades e resultados obtidos.\n\nMATERIAIS DIDÁTICOS\n\nAs pessoas com deficiência são alunos com deficiência visual, auditiva, física, intelectual e múltipla. Cada tipo de deficiência requer adaptações específicas nos materiais didáticos para garantir o acesso à educação de qualidade e a inclusão social desses indivíduos. Para isso, é necessário considerar as necessidades específicas de cada tipo de deficiência e\n\ndesenvolver materiais adaptados e inclusivos.\n\nA seguir, são apresentadas algumas estratégias de desenvolvimento de materiais didáticos que serão adotados no Projeto Cida:\n\n1. Personalização do material: a personalização dos materiais didáticos é essencial para atender às necessidades específicas de cada tipo de deficiência. Isso inclui a adaptação de fontes, tamanhos de letra, cores, formatos e conteúdos.\n\n2. Inclusão de tecnologias assistivas: o uso de tecnologias assistivas, como\n\nsoftwares de leitura, audiodescrição, tradução em libras e recursos de acessibilidade em mídias digitais, é fundamental para garantir o acesso à educação e a inclusão social de pessoas com deficiência.\n\n3. Desenvolvimento de recursos lúdicos: o uso de recursos lúdicos, como jogos,\n\natividades interativas e materiais sensoriais, é uma estratégia que pode ser adotada para engajar os alunos e tornar o aprendizado mais dinâmico e atrativo.\n\n4. Acesso à informação: a informação sobre as necessidades específicas dos alunos com deficiência deve ser amplamente divulgada para os educadores e profissionais envolvidos no projeto. Isso inclui o treinamento e capacitação de professores e a disponibilização de materiais informativos.\n\nO desenvolvimento de materiais didáticos será constante e estará sempre em processo de avaliação e adaptação de acordo com as necessidades e resultados obtidos.\n\nCORPO DE PROFISSIONAIS\n\nPara elaborar um time de ensino para pessoas com deficiência, é importante que haja a presença de profissionais de diferentes especialidades que possam contribuir para uma educação inclusiva e de qualidade. Algumas das especialidades que vão ser consideradas no Projeto Cida para a formação do time de ensino para pessoas com deficiência incluem:\n\nProfessor de Educação Especial: profissional com formação em Educação\n\nEspecial, que possui conhecimento e experiência no atendimento a pessoas com deficiência e pode atuar no planejamento e desenvolvimento de estratégias pedagógicas específicas.\n\nFonoaudiólogo: profissional com formação em Fonoaudiologia, que pode atuar no diagnóstico e tratamento de distúrbios da comunicação, incluindo a linguagem, fala, voz e audição.\n\nPsicólogo: profissional com formação em Psicologia, que pode atuar no suporte emocional e psicológico aos alunos com deficiência, além de contribuir para o desenvolvimento de estratégias pedagógicas específicas para atender suas necessidades.\n\nTerapeuta Ocupacional: profissional com formação em Terapia Ocupacional, que pode atuar no desenvolvimento de atividades que ajudem a promover a autonomia e independência dos alunos com deficiência, além de contribuir para a adaptação de materiais e equipamentos.\n\nMédico Especialista: profissional com formação em medicina e especialização em áreas como a neurologia, oftalmologia, ortopedia e outras especialidades que possam contribuir para o diagnóstico e tratamento de condições médicas que afetem os alunos com deficiência.\n\nPedagogo: profissional com formação em Pedagogia, que pode atuar no\n\nplanejamento e desenvolvimento de estratégias pedagógicas específicas, além de contribuir para a adaptação de materiais e equipamentos.\n\nNutricionista: profissional com formação em Nutrição, que pode atuar no planejamento de uma alimentação saudável e adequada às necessidades dos alunos com deficiência.\n\nÉ importante salientar que a formação de um time de ensino para pessoas com deficiência deve ser personalizada e levar em conta as necessidades específicas dos alunos e as adaptações necessárias para tornar o ambiente educacional inclusivo e acessível.\n\nPARCERIAS\
