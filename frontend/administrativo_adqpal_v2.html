<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Administrativo – ADQPAL</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde: #1a3a2a;
  --verde-med: #1a5a3a;
  --verde-claro: #eef5ee;
  --borda: #cdd8cd;
  --texto: #1a1a1a;
  --cinza: #5a6a5a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', Arial, sans-serif; background: #eef2ee; color: var(--texto); min-height: 100vh; padding: 2rem 1rem; }
.app { max-width: 1180px; margin: 0 auto; }

/* HEADER APP */
.app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
.app-brand { display: flex; align-items: center; gap: 14px; }
.app-brand img { height: 52px; }
.app-brand-text h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--verde); font-weight: 700; }
.app-brand-text p { font-size: 12px; color: var(--cinza); margin-top: 2px; }
.btn-print { background: var(--verde); color: #fff; border: none; padding: 10px 24px; font-size: 13px; font-weight: 700; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; transition: background 0.2s; font-family: inherit; }
.btn-print:hover { background: #0f2a1a; }

/* NAVEGAÇÃO DOS DOCUMENTOS */
.doc-workspace { display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 16px; align-items: start; }
.doc-sidebar { background: #fff; border: 1px solid var(--borda); border-radius: 6px; padding: 14px; position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow: auto; }
.doc-search-wrap { margin-bottom: 12px; }
.doc-search-wrap label { display:block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--cinza); margin-bottom: 5px; }
.doc-search { width: 100%; border: 1px solid var(--borda); border-radius: 4px; padding: 8px 10px; font-family: inherit; font-size: 13px; color: var(--verde); outline: none; background: #f9fbf9; }
.doc-search:focus { border-color: var(--verde-med); background: #fff; }
.doc-count { font-size: 11px; color: var(--cinza); margin: 8px 0 12px; }
.tabs { display: flex; flex-direction: column; gap: 12px; }
.doc-group { border-top: 1px solid #e3ebe3; padding-top: 10px; }
.doc-group:first-child { border-top: none; padding-top: 0; }
.doc-group-title { font-size: 10px; font-weight: 800; color: var(--verde); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
.doc-group-list { display: flex; flex-direction: column; gap: 4px; }
.tab-btn { width: 100%; padding: 7px 9px; font-size: 12px; font-weight: 700; cursor: pointer; border: 1px solid transparent; background: transparent; color: var(--verde); border-radius: 4px; text-align: left; transition: background 0.15s, border-color 0.15s; font-family: inherit; line-height: 1.25; }
.tab-btn.active { background: var(--verde); color: #fff; border-color: var(--verde); }
.tab-btn:hover:not(.active) { background: var(--verde-claro); border-color: var(--borda); }
.doc-main { min-width: 0; }
.doc-main-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #fff; border: 1px solid var(--borda); border-radius: 6px 6px 0 0; padding: 12px 16px; }
.doc-main-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--verde); }
.doc-main-subtitle { font-size: 11px; color: var(--cinza); margin-top: 1px; }
.tab-content { display: none; background: #fff; border: 1px solid var(--borda); border-top: none; border-radius: 0 0 6px 6px; padding: 22px; margin-bottom: 1.2rem; }
.tab-content.active { display: block; }
.empty-filter { display: none; font-size: 12px; color: var(--cinza); padding: 10px; background: #f6faf6; border: 1px dashed var(--borda); border-radius: 4px; }

/* CAMPOS */
.row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 160px; }
.field.full { flex: 1 1 100%; }
.field.half { flex: 1 1 calc(50% - 7px); }
.field.third { flex: 1 1 calc(33% - 10px); }
.field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--cinza); }
.field input, .field textarea, .field select {
  border: none; border-bottom: 1.5px solid var(--borda);
  padding: 5px 2px; font-size: 14px; color: var(--verde);
  outline: none; background: transparent; font-family: inherit;
  transition: border-color 0.2s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-bottom-color: var(--verde-med); }
.field input::placeholder, .field textarea::placeholder { color: #b0bab0; font-size: 13px; }
.field textarea { resize: vertical; min-height: 70px; line-height: 1.6; }
.field select { cursor: pointer; color: var(--verde); }
.field input[readonly] { color: #888; background: #f8f8f8; cursor: not-allowed; }

.section-title { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: var(--verde); border-bottom: 1px solid var(--borda); padding-bottom: 5px; margin: 16px 0 12px; }

.text-base-tools { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: #f3f7f3; border: 1px solid var(--borda); padding: 10px 12px; margin: 10px 0 12px; border-radius: 4px; }
.text-base-tools .tool-field { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--verde); font-weight: 700; }
.text-base-tools select { border: 1px solid var(--borda); background: #fff; color: var(--verde); padding: 5px 8px; font-family: inherit; font-size: 12px; }
.text-base-tools input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--verde-med); }
.text-base-tools button { border: 1px solid var(--verde); background: #fff; color: var(--verde); padding: 6px 10px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; border-radius: 4px; }
.text-base-tools button:hover { background: var(--verde-claro); }

.editable-table-wrap { overflow-x: auto; border: 1px solid var(--borda); border-radius: 4px; margin: 10px 0 14px; }
.editable-table { width: 100%; border-collapse: collapse; min-width: 640px; background: #fff; }
.editable-table th { background: #f3f7f3; color: var(--verde); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding: 7px; border-bottom: 1px solid var(--borda); text-align: left; }
.editable-table td { border-bottom: 1px solid #e3ebe3; padding: 5px; vertical-align: middle; }
.editable-table input { width: 100%; border: 1px solid #d8e2d8; border-radius: 3px; padding: 6px 7px; font-family: inherit; font-size: 12px; color: var(--verde); background: #fff; }
.editable-table .check-cell { width: 32px; text-align: center; }
.editable-table .value-cell { width: 150px; }
.editable-table .row-check { width: 14px; height: 14px; accent-color: var(--verde-med); }
.financial-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px; }
.financial-actions button { border: 1px solid var(--verde); background: #fff; color: var(--verde); padding: 7px 10px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; border-radius: 4px; }
.financial-actions button:hover { background: var(--verde-claro); }
.p-financial-table { width: 100%; border-collapse: collapse; font-size: 9.5px; margin: 12px 0 10px; }
.p-financial-table th { text-transform: uppercase; color: #1a3a2a; border-bottom: 2px solid #1a3a2a; padding: 5px 4px; text-align: left; }
.p-financial-table th:last-child, .p-financial-table td:last-child { text-align: right; width: 105px; white-space: nowrap; }
.p-financial-table td { border-bottom: 1px solid #dfe7df; padding: 3px 4px; vertical-align: top; }
.p-financial-table .total-row td { font-weight: 700; color: #1a3a2a; border-top: 1.5px solid #1a3a2a; background: #f6faf6; }
.p-action-table { width: 100%; border-collapse: collapse; font-size: 8.8px; margin: 10px 0 14px; }
.p-action-table th { background: #1a3a2a; color: #fff; text-transform: uppercase; font-size: 7.5px; letter-spacing: 0.03em; padding: 4px 3px; border: 1px solid #1a3a2a; }
.p-action-table td { border: 1px solid #9aa99a; padding: 3px; vertical-align: top; color: #111; }
.p-action-table .month-cell { text-align: center; font-weight: 700; width: 18px; }
.p-text-table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 8.6px; margin: 10px 0 14px; }
.p-text-table thead { display: table-header-group; }
.p-text-table tr { break-inside: avoid; page-break-inside: avoid; }
.p-text-table th { background: #1a3a2a; color: #fff; padding: 5px 4px; border: 1px solid #1a3a2a; text-align: center; font-weight: 700; }
.p-text-table td { border: 1px solid #9aa99a; padding: 5px 4px; vertical-align: top; overflow-wrap: anywhere; }
.p-text-table td:first-child { font-weight: 600; }
.p-page-attachment { break-before: page; page-break-before: always; text-align: center; }
.p-page-attachment img { display: block; width: 100%; max-height: 250mm; object-fit: contain; margin: 0 auto; }
.p-convite { min-height: 248mm; padding: 18mm 17mm 14mm; border: 3px double #1a3a2a; background: #fffdf8; position: relative; box-sizing: border-box; color: #173326; overflow: hidden; }
.p-convite:before { content: ""; position: absolute; inset: 9mm; border: 1px solid #d7b46a; pointer-events: none; }
.p-convite:after { content: ""; position: absolute; width: 110mm; height: 110mm; right: -35mm; bottom: -38mm; border-radius: 50%; background: rgba(215,180,106,0.13); pointer-events: none; }
.p-convite-inner { position: relative; z-index: 1; min-height: 212mm; display: flex; flex-direction: column; align-items: center; text-align: center; }
.p-convite-logo { width: 118px; margin-bottom: 12mm; }
.p-convite-kicker { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.22em; color: #9a7533; margin-bottom: 4mm; }
.p-convite-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 800; color: #1a3a2a; letter-spacing: 0.08em; text-transform: uppercase; margin: 0 0 8mm; border-bottom: 2px solid #d7b46a; padding-bottom: 3mm; }
.p-convite-text { max-width: 155mm; font-size: 15px; line-height: 1.85; text-align: center; margin: 0 auto 9mm; }
.p-convite-temas { font-family: 'Playfair Display', serif; font-size: 22px; line-height: 1.35; font-weight: 800; color: #1a3a2a; text-transform: uppercase; margin: 2mm 0 8mm; }
.p-convite-info { width: 100%; max-width: 138mm; margin: auto auto 8mm; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6mm; }
.p-convite-info div { border-top: 2px solid #d7b46a; padding-top: 3mm; }
.p-convite-info div:nth-child(3) { grid-column: 1 / -1; }
.p-convite-info strong { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: #9a7533; margin-bottom: 2mm; }
.p-convite-info span { font-size: 14px; font-weight: 700; color: #1a3a2a; }
.p-convite-text .p-text { text-align: center !important; margin-bottom: 4mm; line-height: 1.85; }
.p-convite-local { max-width: 145mm; font-size: 13px; line-height: 1.55; margin-top: 2mm; }
.p-convite-cidade { margin-top: 8mm; font-size: 13px; color: #173326; }

/* CHECKBOX ITEMS */
.check-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; margin: 8px 0; }
.check-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border: 1px solid var(--borda); border-radius: 4px; cursor: pointer; font-size: 13px; }
.check-item:hover { background: var(--verde-claro); }
.check-item input { accent-color: var(--verde-med); width: 14px; height: 14px; }

@media (max-width: 860px) {
  body { padding: 1rem 0.75rem; }
  .doc-workspace { grid-template-columns: 1fr; }
  .doc-sidebar { position: static; max-height: none; }
  .doc-main-header { align-items: flex-start; flex-direction: column; }
}

@media screen { .print-preview { display: none; } }

/* ===== PRINT ===== */
@media print {
  @page {
    size: A4;
    margin: 10mm 15mm 18mm 15mm;
  }
  @page rodapePaginado {
    size: A4;
    margin: 10mm 15mm 24mm 15mm;
    @bottom-center {
      content: "Praça Dr. José Inácio, 173 - Centro - São Miguel dos Campos/AL - CNPJ 16.920.069/0001-73 - associacaoadqpaloficial@gmail.com - (82) 991636096";
      font-size: 7.5px;
      font-weight: 700;
      border-top: 2px solid #000;
      padding-top: 3px;
      width: 100%;
    }
    @bottom-right {
      content: "Pág. " counter(page);
      font-size: 7.5px;
      font-weight: 700;
      padding-top: 3px;
    }
  }
  html, body { height: auto !important; }
  .print-preview { overflow: visible; }
  * { page-break-after: auto !important; }
  .p-page-break { break-before: page !important; page-break-before: always !important; height: 0 !important; }
  body { background: #fff !important; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .app { display: none !important; }
  .print-preview { display: block !important; font-family: 'Source Sans 3', Arial, sans-serif; position: relative; font-size: 12px; color: #000; padding-bottom:0; }
  .print-preview.rodape-paginado { page: rodapePaginado; }

  /* MARCA D'ÁGUA */
  .p-watermark { position: fixed; top: 50%; left: 42%; transform: translate(-50%,-50%); width: 72%; opacity: 0.10; z-index: 0; pointer-events: none; }

  /* CABEÇALHO */
  .p-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #1a3a2a; padding-bottom: 8px; margin-bottom: 14px; }
  .p-logo { height: 68px; object-fit: contain; }
  .p-title-box { background: #1a3a2a; color: #fff; padding: 8px 20px; text-align: center; }
  .p-title-box h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
  .p-title-box h2 .title-line { display: block; }
  .p-title-box span { display: block; font-size: 8px; color: #a0c8a8; margin-top: 2px; letter-spacing: 0.1em; }

  /* CORPO */
  .p-section { margin-bottom: 12px; }
  .p-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #1a3a2a; padding-bottom: 3px; margin-bottom: 8px; }
  .p-field { margin-bottom: 8px; }
  .p-field-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 2px; }
  .p-field-value { font-size: 13px; color: #000; padding-bottom: 2px; min-height: 17px; }
  .p-row { display: flex; gap: 24px; margin-bottom: 8px; }
  .p-row > div { flex: 1; }
  .p-text { font-size: 12px; color: #000; line-height: 1.8; margin-bottom: 10px; text-align: justify; }
  .p-text-bold { font-weight: 700; }
  .p-box { border: 1px solid #bbb; padding: 8px 10px; font-size: 12px; color: #000; min-height: 45px; line-height: 1.7; margin-bottom: 10px; }

  /* DESTAQUE */
  .p-highlight { background: #1a3a2a; color: #fff; padding: 8px 14px; margin: 10px 0; }
  .p-highlight-label { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #a0c8a8; margin-bottom: 3px; }
  .p-highlight-value { font-size: 16px; font-weight: 700; text-transform: uppercase; }

  /* ASSINATURA MÉDICO */
  .p-footer { padding-top: 8px; margin-top: 12px; text-align: center; }
  .p-sign-block { display: inline-block; text-align: center; }
  .p-sign-date { font-size: 10px; color: #333; margin-bottom: 5px; }
  .p-sign-img { display: block; max-width: 160px; height: auto; margin: 0 auto; mix-blend-mode: multiply; }
  .p-sign-line { border-top: 1px solid #333; width: 180px; margin: 3px auto; }
  .p-sign-label { font-size: 9px; color: #444; }

  /* ASSINATURA PRESIDENTE */
  .p-sign-pres-img { display: block; max-width: 60px; height: auto; margin: 0 auto 2px; }
  .p-sign-pres-line { border-top: 1px solid #333; width: 180px; margin: 3px auto; }
  .p-sign-pres-name { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #000; }
  .p-sign-pres-cargo { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.06em; }

  /* DUPLA ASSINATURA */
  .p-sign-dual { display: flex; justify-content: space-between; align-items: flex-end; padding-top: 10px; margin-top: 14px; }
  .p-sign-dual > div { text-align: center; min-width: 180px; }

  /* LISTA */
  .p-list { margin: 6px 0; }
  .p-list-item { display: flex; align-items: baseline; gap: 6px; padding: 2px 0; font-size: 11px; border-bottom: 0.5px solid #eee; }
  .p-list-num { font-size: 9px; color: #888; flex-shrink: 0; width: 18px; }

  /* TABELA */
  .p-table { width: 100%; border-collapse: collapse; font-size: 11px; margin: 8px 0; }
  .p-table th { background: #1a3a2a; color: #fff; padding: 5px 8px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .p-table td { padding: 5px 8px; border-bottom: 0.5px solid #ddd; vertical-align: top; }
  .p-table tr:nth-child(even) td { background: #f8fbf8; }

  /* DOCUMENTOS BASE */
  .p-doc-title { text-align: center; margin: 34px 0 22px; }
  .p-doc-title h2 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #1a3a2a; letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 2px solid #1a3a2a; display: inline-block; padding-bottom: 6px; line-height: 1.45; }
  .p-doc-body { font-size: 11.5px; line-height: 1.75; color: #000; }
  .p-doc-heading { font-weight: 700; text-transform: uppercase; color: #1a3a2a; margin: 13px 0 7px; break-after: avoid-page; page-break-after: avoid; }
  .p-doc-paragraph { margin: 0 0 8px; text-align: justify; break-inside: auto; page-break-inside: auto; }
  .p-doc-bullet { margin: 0 0 5px 16px; text-align: justify; break-inside: auto; page-break-inside: auto; }
  .p-mapa-projeto { width: 100%; margin: 10px auto 12px; text-align: center; break-inside: avoid; page-break-inside: avoid; }
  .p-mapa-projeto img { display: block; width: auto; max-width: 176mm; height: auto; max-height: 210mm; margin-left: auto; margin-right: auto; border: 1px solid #d8dfd8; }
  .p-mapa-projeto-caption { font-size: 9px; color: #444; margin-top: 4px; text-align: center; }

  /* PRESENÇA */
  .p-presenca-table { width: 100%; border-collapse: collapse; font-size: 10.5px; }
  .p-presenca-table th { background: #1a3a2a; color: #fff; padding: 5px 8px; font-size: 9px; text-transform: uppercase; }
  .p-presenca-table td { border: 1px solid #ccc; padding: 5px 8px; height: 22px; }

  .p-rodape { display: none !important; }
  .p-rodape-texto { display: block; padding-right: 58px; }
  .p-numero-pagina { position: absolute; right: 6px; top: 4px; font-size: 8px; font-weight: 700; white-space: nowrap; }
}
</style>
</head>
<body>

<div class="app">

2. FINALIDADE ESTATUTÁRIA:

A Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátricas de São Miguel dos Campos/Alagoas, abreviadamente ADQPAL, fundada no dia 29 de fevereiro de 2012, na cidade de São Miguel dos Campos, é uma associação de direito privado filantrópica, sem fins lucrativos, com duração indeterminada, tendo sede e foro no município de São Miguel dos Campos, Alagoas.

A ADQPAL tem por finalidade geral estatutária coordenar, defender e representar legalmente os pacientes perante a sociedade, promovendo, em função deles, de seus familiares e comunidades, sem distinção e discriminação de raça, cor, profissão, nacionalidade, sexo, credo religioso, orientação sexual ou política, programas e projetos que sirvam às suas finalidades.

Constitui como finalidade específica da ADQPAL a conjunção de esforços, articulação de objetivos e harmonia de procedimentos, caracterizada por promover os princípios da cidadania, garantir à pessoa com deficiência o direito de acesso aos bens e serviços da sociedade, promover acesso a cuidados médicos gerais e especializados, cuidados de enfermagem, apoio psicossocial, reabilitação, integração comunitária, apoio a familiares e cuidadores, atividades socioculturais e desportivas, prevenção do uso indevido de drogas, atenção e reinserção social de usuários e dependentes.

3. PÚBLICO ALVO DA INSTITUIÇÃO:

Os serviços socioassistenciais prestados pela instituição destinam-se às crianças, adolescentes, adultos e suas respectivas famílias em situação de risco pessoal, social, psicossocial e de vulnerabilidade. Destinam-se também às pessoas usuárias de drogas, lícitas ou ilícitas, que busquem voluntariamente os serviços prestados ou que sejam encaminhadas pelas instituições de garantia de direitos, como Conselho Tutelar, Poder Judiciário ou outras instituições.

4. CRITÉRIOS ADOTADOS PARA INSERÇÃO DOS USUÁRIOS NA INSTITUIÇÃO:

Para ter acesso aos serviços, programas e projetos oferecidos pela ADQPAL, os usuários terão que apresentar situação de risco pessoal, social, psicossocial e de vulnerabilidade, a ser analisada mediante avaliação multidisciplinar composta por assistente social, psicólogo, pedagogo, clínico geral e psiquiatra, passando por triagem para adequação aos serviços prestados pela instituição.

5. IDENTIFICAÇÃO DE CADA SERVIÇO, PROJETO, PROGRAMA OU BENEFÍCIO SOCIOASSISTENCIAL PLANEJADO PARA O ANO:

Nome do Projeto: DIGA SIM À VIDA, DIZENDO NÃO ÀS DROGAS

Descrição Sintética do Projeto:
O presente projeto surgiu da necessidade de se falar abertamente sobre as drogas, trocar e adquirir informações sobre o assunto e promover uma ação preventiva, visto que o número de usuários tem aumentado de forma assustadora.

Localização e Abrangência:
O projeto será desenvolvido inicialmente nas escolas públicas e particulares de São Miguel dos Campos, onde serão realizadas atividades de prevenção e formação de agentes multiplicadores por meio de palestras, oficinas, atividades culturais, artísticas e esportivas. As atividades de apoio assistencial, clínico e psicológico serão desenvolvidas na sede da ADQPAL, de acordo com a necessidade dos usuários e de seus familiares.

Justificativa:
O uso ilícito de drogas nos últimos anos tem aumentado em ritmo alarmante e ultrapassado fronteiras sociais, econômicas, políticas e nacionais. Esse aumento pode ser atribuído à falta de informação fidedigna sobre os perigos do consumo de drogas, ao caráter limitado das atividades preventivas e à falta de consciência sobre a magnitude do problema.

A prevenção do uso indevido de drogas, mediante sensibilização, educação e ação, é fundamental para inibir o uso de entorpecentes e a criminalidade associada. Para aquelas pessoas que se iniciaram indevidamente nas drogas, a educação oferece caminho para intervenção e tratamento com êxito, sensibilizando-as sobre riscos e perigos do uso continuado.

É necessário promover ações que valorizem a autoestima dos estudantes, mantendo-os ocupados com atividades saudáveis, enriquecedoras e atraentes, mostrando-lhes o quanto são amados e acolhidos pela família, escola, comunidade e sociedade.

Objetivo Geral:
Desenvolver junto ao corpo docente, discente e à comunidade um trabalho de entendimento sobre drogas, prevenção e consequências do consumo, conhecendo fatores de risco e oferecendo informações adequadas sobre drogas e seus efeitos. Bem como acolher e oferecer oportunidades para que os usuários reconheçam e desenvolvam suas potencialidades, percebendo-se como sujeitos de direitos e deveres, visando à busca de tratamento de recuperação e combate ao uso de entorpecentes.

Objetivos Específicos:
Propiciar às famílias atendidas atividades e processos socioeducativos, por meio de reuniões, palestras e oficinas, garantindo a participação do indivíduo na opção e construção de seu projeto de vida.

Promover ações que ajudem os usuários na conscientização e interação com problemas existentes na sociedade.

Oferecer acompanhamento que priorize e considere as necessidades e singularidades de cada usuário, discutindo a participação da família por meio de orientações, palestras, dinâmicas de grupo, entre outros.

Priorizar momentos de troca, cuidado, atenção, solidariedade e ação conjunta para transformação da realidade.

Metodologia:
A metodologia do trabalho para realização das estratégias adequar-se-á às necessidades dos usuários, familiares e grupos atendidos, reconhecendo suas realidades e práticas, podendo chegar progressivamente a ações transformadoras.`;

var PLANO_ACAO_POS_TABELAS = `5.8 RECURSOS DISPONÍVEIS PARA A AÇÃO/PROJETO

Os recursos disponíveis para a realização da ação/projeto são oriundos de fonte própria, originados de eventos promovidos pela instituição, como bingos, festivais de prêmios, sorteios, doações e contribuições espontâneas dos associados. A ADQPAL buscará firmar parcerias com órgãos públicos das esferas municipal, estadual e federal, bem como com instituições comerciais e empresas, visando implementar o fluxo de caixa para melhor execução da ação.

5.9 PARCERIA PARA A AÇÃO/PROJETO

Serão firmadas parcerias com órgãos municipais como Secretarias de Educação, Assistência Social, Saúde, Esportes, Cultura e Infância e Juventude, além de instituições religiosas que se disponham a colaborar com o referido projeto. Participarão também órgãos da sociedade civil organizada: Conselho Tutelar, Conselhos Municipais de Saúde, Infância e Adolescência, entidade sindical, entre outros.

5.10 RESULTADOS / INDICADORES

Pretende-se com a execução dessa ação informar o máximo possível de pessoas sobre os efeitos devastadores do uso indevido das drogas. Espera-se que a comunidade envolvida torne-se mais consciente sobre os malefícios causados pelo abuso de drogas à vida humana e busque formas de melhorar sua qualidade de vida, agindo com responsabilidade.

Busca-se também oferecer tratamento psicossocial e clínico àqueles que se dispuserem a acompanhamento e tratamento de recuperação contra o uso abusivo das drogas, além de acompanhamento psicossocial às famílias dos usuários envolvidos na ação.

5.12 MONITORAMENTO E AVALIAÇÃO:

A avaliação deverá acontecer durante todo o processo de realização do projeto, por meio da observação dos envolvidos, utilizando questionários aplicados a professores, alunos, pais e funcionários das escolas que receberão o projeto. Serão realizadas também entrevistas com todos os envolvidos para replanejamento das ações.

Durante o desenvolvimento dos trabalhos, é importante que o professor esteja presente para interagir com o processo de trabalho dos alunos, diagnosticando diferenças e conquistas e proporcionando análise das etapas do projeto. Os professores deverão encorajar os participantes a dizerem "NÃO" a qualquer espécie de droga.

5.13 RECURSOS HUMANOS

A ADQPAL contará com equipe multidisciplinar composta por assistente social, psicólogo, clínico geral/cirurgião, psiquiatra, mastologista, fisioterapeuta, angiologista, nutricionista, enfermeira e profissionais voluntários.

5.14 HORÁRIO DE FUNCIONAMENTO DA ENTIDADE

Visando melhor atendimento aos usuários, associados e colaboradores, a ADQPAL funcionará em sua sede de 2ª a 6ª feiras, das 8h às 12h e das 14h às 18h.`;

var PROJETO_UNIDADE_MOVEL_BUCAL_BASE = "ESTADO DE ALAGOAS\nASSOCIAÇÃO DOS DEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS PSIQUIÁTRICAS DE SÃO MIGUEL DOS CAMPOS – ALAGOAS\n\nAQUISIÇÃO DE UNIDADE MÓVEL BUCAL PARA\nO MUNICÍPIO DE SÃO MIGUEL DOS CAMPOS- ALAGOAS\n\n.......................................................................................................................................................\n\nNAEDJA SILVA MELO\nPresidente\nCPF:\nEmail: naedjamelo@gmail.com\n  Contato: (82) 99303-4593\n.......................................................................................................................................................\n\nCÍCERA ARQUELINO ALVES RAMOS\nConsultora Técnica do Projeto\nEmail: arquelves@yahoo.com.br\n celular: (83) 99163-7891\n\nSÃO MIGUEL DOS CAMPOS –AL,2026\n\nAPRESENTAÇÃO\nA Associação para Dependentes Químicos e Portadores de Doenças Psiquiátricas de São Miguel dos Campos- Alagoas, ADQPAL, fundada no dia vinte e nove de fevereiro de dois mil e doze, na respectiva cidade, é uma entidade filantrópica de direito privado sem fins lucrativos, com duração indeterminada, cuja finalidade regida por seu Estatuto e Regimento Interno é a coordenação, defesa e representação legal de pacientes e suas famílias para a consecução dos meios adequados às suas necessidades através da diversidade de programas disponíveis para a comunidade. Enfatiza-se que todas as pessoas serão assistidas, igualmente, sem distinção nem discriminação de raça, cor, profissão, sexo, nacionalidade, credo religioso, orientação sexual ou política.\nEste projeto objetiva oferecer a população miguelense ações preventivas, curativas e de restaurações dentárias com foco na redução dos desdentados e aumento nos índices da assistência bucal na região onde residem as pessoas necessitadas deste atendimento.\nO consultório odontológico deverá conter no mínimo os seguintes equipamentos: cadeira odontológica semi-automática; equipo com seringa tríplice com saída para micromotor de baixa rotação e contra ângulo; unidade auxiliar com sugador; refletor odontológico; compressor de ar odontólogo; autoclave para esterilização; amalgamador; fotopolimerizador;  aparelho de profilaxia com ultrassom e jato de bicarbonato; mocho; balde    de inox 10 litros; lavatório e reservatório de água e ar condicionado.\nA elaboração deste projeto surge da dificuldade ao acesso da assistência bucal pela população de São Miguel dos Campos apresentando, dentre outros fatores, a impossibilidade de locomoção pelas famílias que precisam assistir aos parentes dependentes químicos e a pacientes portadores de doenças psiquiátricas e demais agravos que afetam a saúde, além das distâncias aos postos de atendimentos públicos.\n\tJUSTIFICATIVA\n\tO município de São Miguel dos Campos, localizado no estado de Alagoas, inscrito sob o código 2708600, apresenta área territorial de 360,882 km² e conforme o censo realizado no ano de 2010 pelo Instituto Brasileiro de Geografia e Estatística, sua  população residente atual é de 54.577 (cinquenta e quatro mil e quinhentos e setenta e sete) habitantes, tem a sua economia baseada no petróleo, gás natural, agricultura canavieira, pecuária, indústria açucareira e de cimento. Perfazendo um total de 12.407 (doze mil e quatrocentas e sete) pessoas ocupadas nessas atividades. Desta população residente, 26.565 (vinte e seis mil e quinhentos e sessenta e cinco) são homens e 28.012 (vinte e oito mil e doze) são mulheres e 38.746 (trinta e oito mil e setecentas e quarenta e seis) são pessoas alfabetizadas. A população atual estimada em 2016 é de 61.204 (sessenta e um mil e duzentos e quatro) habitantes.\n\tSão aspectos socioeconômicos da população miguelense: a mortalidade infantil é de 33,1 por 1000 nascidos vivos e consiste na morte de crianças no primeiro ano de vida e é a base para calcular a taxa de mortalidade infantil observada durante um ano; a esperança de vida ao nascer é de 68,1 anos, portanto, a expectativa de vida é um dos indicadores da qualidade de vida de um país, região ou localidade e é utilizada também para medir o retorno de investimentos aplicados para a melhoria das condições de vida, determinando vários índices, dentre os quais o Índice de Desenvolvimento Humano, que no município em questão é de 0,623, classificado como IDH médio. O IDH objetiva comparar e classificar os países como desenvolvidos (desenvolvimento humano muito alto), em desenvolvimento (desenvolvimento humano médio e alto) e subdesenvolvidos (desenvolvimento humano baixo). A proporção de pobres é de 62.8%. 40,8% da renda são apropriados pelos 80% mais pobres ao passo que 59,2% se destinam aos 20% mais ricos.\n\tO valor do rendimento nominal mediano mensal per capita dos domicílios particulares permanentes na zona rural é de R$ 172,86 (cento e setenta e dois reais e oitenta e seis centavos), ao passo que esse valor em relação aos domicílios particulares permanentes na zona urbana é de R$ 255,00 (duzentos e cinquenta e cinco reais); Por situação do domicílio, na zona rural, o valor do rendimento nominal médio mensal dos domicílios particulares é de R$ 847,48 (oitocentos e quarenta e sete reais e quarenta e oito centavos), enquanto na área urbana o valor é de R$ 1.420,17 (um mil e quatrocentos e vinte reais e dezessete centavos).\n\tDiante da situação socioeconômica da população, justifica-se a elaboração deste projeto intitulado Aquisição de Unidade Odontológica Móvel para o Município de São Miguel dos Campos dentro da proposta nacional do Plano Brasil sem Miséria, cujas ações do governo federal contemplou 117 municípios de 20 estados no ano de 2015. O projeto objetiva prestar assistência bucal às pessoas residentes em locais de difícil acesso, na zona rural, em situação de rua, aos dependentes químicos, aos portadores de distúrbios,\n\nPsiquiátricos, aos remanescentes quilombolas e a população em geral dentro da região onde moram. De modo que a unidade móvel bucal atenda as necessidades das pessoas carentes sem que as mesmas precisem se deslocar ao serviço de saúde, portanto, o consultório odontológico móvel irá aos locais onde os usuários tem moradia fixa ou temporária para prestar assistência bucal gratuita. No estado de Alagoas foram contemplados com as Unidades Odontológicas Móveis os municípios de Maceió, Nova Igreja e Taquarana.\nObjetivando ampliar o acesso ao tratamento dentário no Sistema Único de Saúde até  outubro do ano passado foram entregues 117 Unidades Odontológicas Móveis. Foram beneficiados com a ação cinco Distritos Sanitários Especiais Indígenas. O Ministério da Saúde estima que mais de 350 mil pessoas residentes em locais de difícil acesso, populações indígenas e em situação de rua passem a ter acesso a tratamento dentário. Ao todo, foram investidos R$ 18 milhões na compra dos veículos e equipamentos, além de R$ 6,5 milhões por ano que serão repassados pelo governo federal para o custeio das unidades.\nAs primeiras 13 unidades, destinadas ao Piauí, foram entregues pelo ex- ministro da Saúde, Marcelo Castro, durante agenda em Teresina, capital do estado, na gestão da ex- presidenta Dilma Rousseff. E as demais foram entregues conforme cronograma do governo federal.\nAs doações das unidades pelo Ministério da Saúde às prefeituras, em 2015, priorizou  117 município. Foram entregues 103 unidades móveis  aos municípios do Plano Brasil Sem Miséria para atender, principalmente, a população rural. Do total, sete foram alocadas em Distritos Sanitários Especiais Indígenas (DSEI) e sete para Consultórios na Rua, criados com o objetivo de ampliar o acesso das pessoas em situação de rua aos serviços de saúde.\nNo período de 2010 a 2013, foram entregues pelo Ministério da Saúde 185 Unidades Odontológicas Móveis, sendo que destas, 25 estão alocadas em Distritos Sanitários Especiais Indígenas (DSEI) e 160 em municípios pertencentes ao Mapa da Pobreza, portanto,  prioritários para o Plano Brasil Sem Miséria. Com a entrega dessas novas 117 unidades, o Brasil passa a contar com 302 unidades móveis em todos os 26 estados do país e no Distrito Federal. Totalizando investimentos na ordem de R$ 46,5 milhões para a compra das unidades e R$ 16,9 milhões repassados anualmente para custeio.\nIntegram a unidade os mesmos equipamentos de um consultório odontológico tradicional: cadeira odontológica, raio-x, autoclave para esterilização do material, além de instrumentos dentários para o uso dos profissionais. Estima-se 350 atendimentos por mês de cada Unidade Odontológica Móvel.\nOBJETIVO GERAL\n\tAdquirir 01 Unidade Odontológica Móvel para prestar assistência bucal às pessoas dentro da região onde moram.\nOBJETIVOS ESPECÍFICOS\n\tOferecer atendimento odontológico às pessoas que residem em locais de difícil acesso, na zona rural, e nos remanescentes quilombolas;\n\tProporcionar o acesso ao tratamento dentário às pessoas que se encontram em situação de rua, aos dependentes químicos e aos portadores de doenças psiquiátricas e seus familiares;\n\tPromover a acessibilidade à população em geral ao serviço gratuito de saúde bucal;\n\tDivulgar o consultório odontológico móvel na mídia local e nos espaços públicos;\n\tRealizar campanhas de sensibilização para conscientizar a comunidade acerca da importância da saúde bucal;\n\nPLANO DE AÇÃO\n\nAções | Articulação e parcerias | Responsáveis | Metas\nAtenção à saúde bucal das pessoas que residem em locais de difícil acesso, na zona rural e aos remanescentes quilombolas | Secretarias de Saúde, Assistência Social e Educação; Câmara Municipal; programas governamentais e não governamentais | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Atender 100% desse público-alvo\nOferta de tratamento dentário às pessoas com dependência química, aos portadores de doenças psiquiátricas e suas famílias | Secretaria Municipal de Saúde; ADQPAL | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Prestar assistência odontológica a 100% desse público-alvo\nCuidado da saúde bucal das pessoas em situação de rua | Secretarias de Saúde e Assistência Social | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Realizar tratamento dentário para 100% desse público-alvo\nAções de saúde bucal no Dia Internacional da Mulher, Dia das Mães e Dia dos Pais | Secretarias de Saúde, Assistência Social e da Mulher | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Atender a demanda livre\nAtendimento da população urbana em geral | Secretarias de Saúde, Assistência Social e Educação; creches | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Tratar a saúde bucal do público dos CRAS/CREAS, escolas, creches e usuários do SUS\nCampanhas de sensibilização sobre cuidados básicos com os dentes | Secretarias de Saúde, Assistência Social e Educação | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Conscientizar 100% da comunidade\nDivulgação do consultório odontológico móvel na mídia local | Secretaria de Saúde e Assessoria de Imprensa | Prefeitura Municipal de São Miguel dos Campos e demais parcerias | Divulgar o serviço móvel de saúde bucal nos meios de comunicação\nMETAS\nImplantar o Serviço de Unidade Odontológica Móvel em São Miguel dos Campos;\nDescentralizar a assistência à saúde bucal;\nAÇÕES PREVISTAS\nPromover o acesso ao tratamento dentário às pessoas dentro da região onde as mesmas residem;\n Realizar campanhas educativas sobre o cuidado com a escovação na infância, idade adulta e terceira idade;\n Divulgar a Unidade Odontológica Móvel na mídia local e junto a toda a comunidade.\nRESULTADOS  ESPERADOS\nPreservar e cuidar da saúde bucal dos grupos vulneráveis contemplados neste projeto e da população em geral;\nImpulsionar o fluxo de atendimento dentário na Unidade Odontológica Móvel;\nPromover a acessibilidade de toda a população ao Serviço Bucal Móvel;\n\nESTIMATIVA DE CUSTOS:  Em anexo, as propostas de preços pesquisados.\n\nItem | Descrição | Quantidade | Valor unitário | Valor total\n01 | Consultório Onix C4 cinza nevado | 01 | R$ 12.000,00 | R$ 12.000,00\n02 | Compressor modelo DA 1000 | 01 | R$ 2.600,00 | R$ 2.600,00\n03 | Broca diamantina 1012 | 20 | R$ 2,00 | R$ 40,00\n04 | Contra-ângulo intra com refrigeração | 01 | R$ 415,00 | R$ 415,00\n05 | Micromotor intra com refrigeração | 01 | R$ 350,00 | R$ 350,00\n06 | Alta rotação Mega Torque Trijato | 01 | R$ 335,00 | R$ 335,00\n07 | Autoclave 12 litros inox Vitale | 01 | R$ 3.190,00 | R$ 3.190,00\nTotal |  |  |  | R$ 18.930,00\n\nVersão | Cor | Opcionais | Ano/modelo | Valor unitário\nNova Master Extra Furgão L3H2 | Branca | Direção hidráulica; airbag duplo; freios ABS; ar-condicionado; retrovisores elétricos | 2016/2017 | R$ 141.160,00\n\nValor total do projeto: R$ 160.090,00 ( Cento de sessenta  mil e noventa reais)\n\nFONTE DE RECURSO: Emendas Parlamentares";

var EDITAL_ELEICAO_2027_BASE = "Associação dos Dependentes Quimicos e Portadores de Doenças Psiquiátricas\n\nde S.M.Campos-ADQPAL. Edital de Convocação Para Eleição 2024/2027\n\nA Presidente da Associação dos Dependentes Quimicos e Portadores de Doenças Psiquiátricas de S.M.Campos-ADQPAL, CNPJ nº 16.920.069/0001-73, com endereço na Praça Dr. José Inácio, nº 173, Centro, CEP nº 57241-234. Sra. Naedja Silva Melo, no uso de suas atribuições legais, convoca os familiares e Dependentes Quimicos e Portadores de Doenças Psiquiátricas associados e residentes no Municipio acima citado, para participarem da eleição da Diretoria Executiva, Conselho Fiscal: Titulares e Suplentes a ser realizado no dia 10 de janeiro de 2024 às 15:00hs na Praça Dr. José Inácio, nº 173, Centro,São Miguel dos Campos-Alagoas para a Gestão 2024/2027. Conforme disposição a legislação vigente, a forma de eleição, para os cargos consistira nome, cargo e identificação dos candidatos.E terá a seguinte composição: Presidente, Vice Presidente, 1º e 2º Secretário, 1º e 2º Diretor Financeiro e Conselho Fiscal: Titular e Suplente, Diretor social, Diretor de patrimônio. A eleição será feita por voto individual, direto e secreto. No caso de chapa única, a eleição dar-se-á por aclamação expressa a chapa apresentada. Na hipótese da alternativa “nâo” alcançar metade mais um dos votos dos eleitores presentes ao pleito, esta não poderá ser proclamada eleita, resultando em que iniciará novamente todo o procedimento para novo pleito.São Miguel dos Campos-Alagoas, 10 de janeiro de 2024.";

var PROJETO_VEICULO_UTILITARIO_BASE = "ESTADO DE ALAGOAS\nASSOCIAÇÃO DOS DEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS\nPSIQUIÁTRICAS DE SÃO MIGUEL DOS CAMPOS\n\nPROJETO PARA AQUISIÇÃO DE VEÍCULO UTILITÁRIO MICRO  PARA REALIZAÇÃO DE VISITAS DOMICILIARES E CONSULTORIO MÓVEL AOS DEPENDENTES QUIMICOS E PORTADORES DE TRANSTORNOS MENTAIS E A SUAS FAMÍLIAS RESIDENTES NO MUNICÍPIO DE SÃO MIGUEL DOS CAMPOS\n\nSÃO MIGUEL DOS CAMPOS/AL, 15 de Janeiro de 2024\nAPRESENTAÇÃO\nA Associação para Dependentes Químicos e Portadores de Doenças Psiquiátricas de São Miguel dos Campos- Alagoas, ADQPAL, fundada no dia vinte e nove de fevereiro de dois mil e doze, na respectiva cidade, é uma entidade filantrópica de direito privado sem fins lucrativos, com duração indeterminada, cuja finalidade regida por seu Estatuto e Regimento Interno é a coordenação, defesa e representação legal de pacientes e suas famílias para a consecução dos meios adequados às suas necessidades através da diversidade de programas disponíveis para a comunidade. Enfatiza-se que todas as pessoas serão assistidas, igualmente, sem distinção nem discriminação de raça, cor, profissão, sexo, nacionalidade, credo religioso, orientação sexual ou política.\n\tA ADQPAL apresenta como finalidade específica a conjunção de esforços, articulação de objetivos e harmonia de procedimentos, caracterizada principalmente pela promoção da cidadania da pessoa com deficiência garantindo o direito ao acesso de todos os bens e serviços que a sociedade oferece, bem como o respeito aos direitos civis, políticos, sociais, econômicos e culturais, prevenindo e proibindo a discriminação, direta ou indireta, sob todas as suas formas em razão da deficiência; acesso a cuidados médicos gerais e à especialidade de psiquiatria; prestação dos cuidados de enfermagem gerais e especializados em saúde mental e em psiquiatria; apoio psicossocial, reabilitação e reintegração na sociedade dos pacientes e apoio a familiares e outros cuidadores; promoção de atividades sócio-culturais e desportivas em articulação com autarquias, associações culturais, recreativas, desportivas e outras estruturas da comunidade; a reabilitação e a autonomia das pessoas com incapacidade psicossocial.\n\tDentro do leque das finalidades específicas, a ADQPAL enfatiza ainda a promoção de uma política global, integral e transversal de prevenção, habilitação, reabilitação e participação da pessoa com dependência química e distúrbios psiquiátricos; igualdade de oportunidades para que este público alvo disponha de condições que permitam a plena participação na sociedade; promoção de uma sociedade para todos com a eliminação de barreiras e adoção de medidas que visem a plena participação da pessoa com dependência química; atenção ao usuário e ao dependente de drogas e familiares através de equipe multidisciplinar; respeito ao usuário e ao dependente de drogas independentemente de quaisquer condições, observados os direitos fundamentais da pessoa humana, os princípios e diretrizes do Sistema Único de Saúde e da Política Nacional da Assistência Social; a prevenção do uso indevido, a atenção e a reinserção social dos usuários e dependentes de drogas; construção e socialização do conhecimento sobre drogas no país; o investimento em alternativas esportivas, culturais, artísticas e profissionais, dentre outras, como forma de inclusão social e de melhoria da qualidade de vida e a implantação de projetos pedagógicos de prevenção do uso indevido de drogas  nas instituições de ensino público e privado, alinhados às diretrizes curriculares nacionais e aos conhecimentos relacionados às drogas.\n\nJUSTIFICATIVA\nO município de São Miguel dos Campos, localizado no estado de Alagoas, inscrito sob o código 2708600, apresenta área territorial de 360,882 km² e conforme o censo realizado no ano de 2010 pelo Instituto Brasileiro de Geografia e Estatística, sua população residente atual é de 54.577 (cinquenta e quatro mil e quinhentos e setenta e sete) habitantes, tem a sua economia baseada no petróleo, gás natural, agricultura canavieira, pecuária, indústria açucareira e de cimento. Perfazendo um total de 12.407 (doze mil e quatrocentas e sete) pessoas ocupadas nessas atividades. Desta população residente, 26.565 (vinte e seis mil e quinhentos e sessenta e cinco) são homens e 28.012 (vinte e oito mil e doze) são mulheres e 38.746 (trinta e oito mil e setecentas e quarenta e seis) são pessoas alfabetizadas. A população atual estimada em 2016 é de 61.204 (sessenta e um mil e duzentos e quatro) habitantes.\n\tSão aspectos socioeconômicos da população miguelense: a mortalidade infantil é de 33,1 por 1000 nascidos vivos e consiste na morte de crianças no primeiro ano de vida e é a base para calcular a taxa de mortalidade infantil observada durante um ano; a esperança de vida ao nascer é de 68,1 anos, portanto, a expectativa de vida é um dos indicadores da qualidade de vida de um país, região ou localidade e é utilizada também para medir o retorno  índices, dentre os quais o Índice de Desenvolvimento Humano, que no município em questão é de 0,623, classificado como IDH médio. O IDH objetiva comparar e classificar os países como desenvolvidos (desenvolvimento humano muito alto), em desenvolvimento (desenvolvimento humano médio e alto) e subdesenvolvidos (desenvolvimento humano baixo). A proporção de pobres é de 62.8%. 40,8% da renda são apropriados pelos 80% mais pobres ao passo que 59,2% se destinam aos 20% mais ricos.\n\tO valor do rendimento nominal mediano mensal per capita dos domicílios particulares permanentes na zona rural é de R$ 172,86 (cento e setenta e dois reais e oitenta e seis centavos), ao passo que esse valor em relação aos domicílios particulares permanentes na zona urbana é de R$ 255,00 (duzentos e cinquenta e cinco reais); Por situação do domicílio, na zona rural, o valor do rendimento nominal médio mensal dos domicílios particulares é de R$ 847,48 (oitocentos e quarenta e sete reais e quarenta e oito centavos), enquanto na área urbana o valor é de R$ 1.420,17 (um mil e quatrocentos e vinte reais e dezessete centavos).\n          A Associação dos Dependentes Químicos e Portadores de Transtornos Mentais de São Miguel dos Campos conta com equipe profissional multidisciplinar voluntária que presta atendimento médico e psicossocial gratuitos, especificado da seguinte forma: o clínico geral e o psiquiatra atendem a cada quinzena, respectivamente, quinze e dez pacientes;  o psicólogo\natende quinze pacientes por semana, totalizando por mês trinta atendimentos do clínico geral, vinte atendimentos do psiquiatra, sessenta atendimentos da psicologia e o Serviço Social atende  cento e dez  pacientes e encaminhamentos diversos, além de acompanhar também as famílias. O acompanhamento jurídico é assegurado e garantido para os casos que assim o exigirem. Os atendimentos são prestados em consultório e também a domicílio.\n\tDiante da situação socioeconômica da população, justifica-se a elaboração deste projeto intitulado Aquisição de Veículo Utilitário Micro-ônibus para Visitas Domiciliares e Consultório Móvel e Acompanhamento de Pacientes Dependentes Químicos e de Transtornos Mentais e suas Famílias no Município de São Miguel dos Campos – AL, público que vem sendo assistido pela ADQPAL desde a sua inauguração. A criação da associação se deu em razão das necessidades desses pacientes e suas famílias para combater o grande preconceito e discriminação para com essa população vulnerável prestando-lhe total apoio.\nOBJETO\nAquisição de veículo utilitário Micro-ônibus.\nOBJETIVO GERAL\nAdquirir 01 veículo utilitário para visitas domiciliares e acompanhamento aos dependentes químicos e portadores de transtornos mentais e suas famílias.\nOBJETIVOS ESPECÍFICOS\nOferecer aos usuários cadastrados e as suas famílias continuidade do atendimento médico, psicossocial e jurídico através do acompanhamento domiciliar;\nProporcionar confiabilidade no trabalho da equipe profissional multidisciplinar através de visitas domiciliares regulares;\nAssegurar que os pacientes não abandonem o tratamento da dependência química nem dos transtornos mentais;\nAÇÕES CONTÍNUAS REALIZADAS\nPalestras educativas sobre o perigo do uso das drogas ilícitas e lícitas nas escolas públicas e privadas;\nCampanhas preventivas de combate às drogas na área periférica;\n Encaminhamentos para desintoxicação de dependentes químicos;\n\nMETAS\nImplantar o serviço de visitas domiciliares para acompanhamento dos dependentes químicos e portadores de transtornos mentais e suas famílias no Município de São Miguel dos Campos através da ADQPAL.\n\nPÚBLICO ALVO\nDependentes químicos, portadores de transtornos mentais e suas famílias, sendo beneficiadas no total 220 pessoas.\n\nMETODOLOGIA DE PRESTAÇÃO DA ASSISTÊNCIA\nVisitas domiciliares regulares realizadas pela equipe profissional multidisciplinar.\n\nRECURSOS MATERIAIS\nRecursos materiais existentes: birôs, cadeira, gela agua, cadeira de roda e tv.\nRecursos materiais necessários: veículo para visita domiciliar\n\nDESPESAS DE CUSTEIO\nAs despesas com água, luz e telefone são pagas com doações da comunidade e comerciantes locais. Não há custo para o aluguel pois o espaço é fruto de concessão.\n\nRESULTADOS ESPERADOS\nEvitar a evasão ao tratamento da dependência química e dos transtornos psiquiátricos através das visitas domiciliares aos pacientes e suas famílias;\nEstimular a adesão ao tratamento médico, psicossocial e desintoxicação dos usuários e dependentes químicos;\n\nESPECIFICAÇÕES DO PROJETO\nVeículo utilitário com ar condicionado, direção hidráulica, vidro elétrico dianteiro, travas elétricas, assento para cinco pessoas.\nCRONOGRAMA DAS VISITAS DOMICILIARES\nVisitas semanais conforme a demanda.\n\nNaedja Silva Melo\nPresidente\nCPF: 065.660.824-25\nEmail: naedjamelo@gmail.com\nContato: (82) 99303-4593";

var PROJETO_EQUIPAMENTO_HOSPITALAR_BASE = "ESTADO DE ALAGOAS\nASSOCIAÇÃO DOS DEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS\nPSIQUIÁTRICAS DE SÃO MIGUEL DOS CAMPOS\n\nPROJETO PARA AQUISIÇÃO DE EQUIPAMENTOS PARA A ASSOCIAÇÃO DOS  DEPENDENTES QUIMICOS E PORTADORES DE TRANSTORNOS MENTAIS E A SUAS FAMÍLIAS RESIDENTES NO MUNICÍPIO DE SÃO MIGUEL DOS CAMPOS\n\nSÃO MIGUEL DOS CAMPOS/AL, 15 de Janeiro de 2024\nAPRESENTAÇÃO\nA Associação para Dependentes Químicos e Portadores de Doenças Psiquiátricas de São Miguel dos Campos- Alagoas, ADQPAL, fundada no dia vinte e nove de fevereiro de dois mil e doze, na respectiva cidade, é uma entidade filantrópica de direito privado sem fins lucrativos, com duração indeterminada, cuja finalidade regida por seu Estatuto e Regimento Interno é a coordenação, defesa e representação legal de pacientes e suas famílias para a consecução dos meios adequados às suas necessidades através da diversidade de programas disponíveis para a comunidade. Enfatiza-se que todas as pessoas serão assistidas, igualmente, sem distinção nem discriminação de raça, cor, profissão, sexo, nacionalidade, credo religioso, orientação sexual ou política.\n\tA ADQPAL apresenta como finalidade específica a conjunção de esforços, articulação de objetivos e harmonia de procedimentos, caracterizada principalmente pela promoção da cidadania da pessoa com deficiência garantindo o direito ao acesso de todos os bens e serviços que a sociedade oferece, bem como o respeito aos direitos civis, políticos, sociais, econômicos e culturais, prevenindo e proibindo a discriminação, direta ou indireta, sob todas as suas formas em razão da deficiência; acesso a cuidados médicos gerais e à especialidade de psiquiatria; prestação dos cuidados de enfermagem gerais e especializados em saúde mental e em psiquiatria; apoio psicossocial, reabilitação e reintegração na sociedade dos pacientes e apoio a familiares e outros cuidadores; promoção de atividades sócio-culturais e desportivas em articulação com autarquias, associações culturais, recreativas, desportivas e outras estruturas da comunidade; a reabilitação e a autonomia das pessoas com incapacidade psicossocial.\n\tDentro do leque das finalidades específicas, a ADQPAL enfatiza ainda a promoção de uma política global, integral e transversal de prevenção, habilitação, reabilitação e participação da pessoa com dependência química e distúrbios psiquiátricos; igualdade de oportunidades para que este público alvo disponha de condições que permitam a plena participação na sociedade; promoção de uma sociedade para todos com a eliminação de barreiras e adoção de medidas que visem a plena participação da pessoa com dependência química; atenção ao usuário e ao dependente de drogas e familiares através de equipe multidisciplinar; respeito ao usuário e ao dependente de drogas independentemente de quaisquer condições, observados os direitos fundamentais da pessoa humana, os princípios e diretrizes do Sistema Único de Saúde e da Política Nacional da Assistência Social; a prevenção do uso indevido, a atenção e a reinserção social dos usuários e dependentes de drogas; construção e socialização do conhecimento sobre drogas no país; o investimento em alternativas esportivas, culturais, artísticas e profissionais, dentre outras, como forma de inclusão social e de melhoria da qualidade de vida e a implantação de projetos pedagógicos de prevenção do uso indevido de drogas  nas instituições de ensino público e privado, alinhados às diretrizes curriculares nacionais e aos conhecimentos relacionados às drogas.\n\nJUSTIFICATIVA\nO município de São Miguel dos Campos, localizado no estado de Alagoas, inscrito sob o código 2708600, apresenta área territorial de 360,882 km² e conforme o censo realizado no ano de 2010 pelo Instituto Brasileiro de Geografia e Estatística, sua população residente atual é de 54.577 (cinquenta e quatro mil e quinhentos e setenta e sete) habitantes, tem a sua economia baseada no petróleo, gás natural, agricultura canavieira, pecuária, indústria açucareira e de cimento. Perfazendo um total de 12.407 (doze mil e quatrocentas e sete) pessoas ocupadas nessas atividades. Desta população residente, 26.565 (vinte e seis mil e quinhentos e sessenta e cinco) são homens e 28.012 (vinte e oito mil e doze) são mulheres e 38.746 (trinta e oito mil e setecentas e quarenta e seis) são pessoas alfabetizadas. A população atual estimada em 2016 é de 61.204 (sessenta e um mil e duzentos e quatro) habitantes.\n\tSão aspectos socioeconômicos da população miguelense: a mortalidade infantil é de 33,1 por 1000 nascidos vivos e consiste na morte de crianças no primeiro ano de vida e é a base para calcular a taxa de mortalidade infantil observada durante um ano; a esperança de vida ao nascer é de 68,1 anos, portanto, a expectativa de vida é um dos indicadores da qualidade de vida de um país, região ou localidade e é utilizada também para medir o retorno  índices, dentre os quais o Índice de Desenvolvimento Humano, que no município em questão é de 0,623, classificado como IDH médio. O IDH objetiva comparar e classificar os países como desenvolvidos (desenvolvimento humano muito alto), em desenvolvimento (desenvolvimento humano médio e alto) e subdesenvolvidos (desenvolvimento humano baixo). A proporção de pobres é de 62.8%. 40,8% da renda são apropriados pelos 80% mais pobres ao passo que 59,2% se destinam aos 20% mais ricos.\n\tO valor do rendimento nominal mediano mensal per capita dos domicílios particulares permanentes na zona rural é de R$ 172,86 (cento e setenta e dois reais e oitenta e seis centavos), ao passo que esse valor em relação aos domicílios particulares permanentes na zona urbana é de R$ 255,00 (duzentos e cinquenta e cinco reais); Por situação do domicílio, na zona rural, o valor do rendimento nominal médio mensal dos domicílios particulares é de R$ 847,48 (oitocentos e quarenta e sete reais e quarenta e oito centavos), enquanto na área urbana o valor é de R$ 1.420,17 (um mil e quatrocentos e vinte reais e dezessete centavos).\n          A Associação dos Dependentes Químicos e Portadores de Transtornos Mentais de São Miguel dos Campos conta com equipe profissional multidisciplinar voluntária que presta atendimento médico e psicossocial gratuitos, especificado da seguinte forma: o clínico geral e o psiquiatra atendem a cada quinzena, respectivamente, quinze e dez pacientes; o psicólogo\natende quinze pacientes por semana, totalizando por mês trinta atendimentos do clínico geral, vinte atendimentos do psiquiatra, sessenta atendimentos da psicologia e o Serviço Social atende  cento e dez  pacientes e encaminhamentos diversos, além de acompanhar também as famílias. O acompanhamento jurídico é assegurado e garantido para os casos que assim o exigirem. Os atendimentos são prestados em consultório e também a domicílio.\n\tDiante da situação socioeconômica da população, justifica-se a elaboração deste projeto intitulado PROJETO PARA AQUISIÇÃO DE EQUIPAMENTOS HOSPITALARES AOS DEPENDENTES QUIMICOS E PORTADORES DE TRANSTORNOS MENTAIS E A SUAS FAMÍLIAS RESIDENTES NO MUNICÍPIO DE SÃO MIGUEL DOS CAMPOS, público que vem sendo assistido pela ADQPAL desde a sua inauguração. A criação da associação se deu em razão das necessidades desses pacientes e suas famílias para combater o grande preconceito e discriminação para com essa população vulnerável prestando-lhe total apoio.\nOBJETIVO GERAL\n\tAdquirir, 01(um) Aparelho de Ultrassonografia e 01 (um) Eletrocardiograma 12 canais para atendimento à população carente.\nOBJETIVOS ESPECÍFICOS\n\tOferecer aos usuários cadastrados e as suas famílias continuidade do atendimento médico, psicossocial e jurídico através do acompanhamento domiciliar;\n\tProporcionar confiabilidade no trabalho da equipe profissional multidisciplinar;\n\tAssegurar que os pacientes não abandonem o tratamento da dependência química nem dos transtornos mentais;\nMETAS\nImplantar o serviço de visitas domiciliares para acompanhamento dos dependentes químicos e portadores de transtornos mentais e suas famílias no Município de São Miguel dos Campos através da ADQPAL.\n\nDESPESAS DE CUSTEIO\nAs despesas com água, luz e telefone são pagas com doações da comunidade e comerciantes locais. Não há custo para o aluguel pois o espaço é fruto de concessão.\n\nFonte de recurso: Federal\nNAEDJA SILVA MELO\nPresidente\nCPF: 065.660.824-25\nEmail: naedjamelo@gmail.com\nContato: (82) 99303-4593";

var CONTRATO_LABCLIN_2025_BASE = "CL LabClin - Laboratório de Análises Clínicas\n\nEndereço: Loteamento Wellington Torres - Quadra A, Nº13 Bairro de Fátima -\n\nSão Miguel dos Campos | CEP: 57245-169. Telefone e Whatsapp: (82) 99808-4180\n\nTERMO DE FOMENTO – SAÚDE E EXAMES LABORATORIAIS, QUE ENTRE SI CELEBRAM CL LABCLIN NO MUNICIPIO DE SÃO MIGUEL CAMPOS E A (ADQPAL) ASSOCIAÇÃO DOS DEPENDENTES QUIMICOS E PORTADORES DE DOENÇAS PSIQUIATRICAS DE SÂO MIGUEL DOS CAMPOS/AL.\n\nCONTRATANTE – ADQPAL- ASSOCIAÇÃO DOS DEEPENDENTES QUÍMICOS E PORTADORES DE DOENÇAS PSIQUIATRICAS DE SÃO MIGUEL DOS CAMPOS/AL – ADQPAL, é uma Entidade Civil de direito privado, sem fins lucrativos de caráter beneficente e Filantrópica, na área da Saúde, Assistência Social, Educação, Esporte e Cultura, com CNPJ: nº 16.920.069/0001/73, qualificada como Utilidade Pública Municipal de Lei nº 1.383, de 15 de Abril de 2014 e Utilidade Pública Estadual de Lei nº7.571 de 18 de dezembro de 2013, CNES de nº 9033459 de 02 de agosto de 2016, e inscrita no Conselho Municipal de Assistência Social sob nº 17 da Lei Orgânica de nº 8.742, de 07 de dezembro de 1993, com duração por tempo indeterminado, situado na Praça Dr. José Inácio nº 173, centro do Município de São Miguel dos Campos, no Estado de Alagoas, CEP: 57.241-234, onde mantém sede e foro jurídico, neste ato representada pela Presidente MARIA EDINEIDE DOS SANTOS, casada, Técnica de Enfermagem, inscrita no CPF: nº 049.154.324-75.\n\nCONTRATADA: Castro & Laranjeira LTDA., inscrito no CNPJ nº 41.877.867/0001- 07, com sede no Loteamento Wellington Torres, Qd. A, 13, Bairro de Fátima, São Miguel dos Campos, Alagoas,CEP 57245-169. O presente instrumento se encontra em total e ampla consonância com normas previstas pelo ordenamento jurídico nacional e vinculam a livre e espontânea vontade entre as partes.\n\nCLÁUSULA PRIMEIRA – Do Objeto: O presente instrumento possui o objetivo de regular a relação entre as partes no que diz respeito à prestação do serviço de realização de exames patológicos laboratoriais que serão desempenhados pelo CONTRATADO em prol do CONTRATANTE atendendo sua demanda nos termos seguintes.\n\nParágrafo Primeiro: Os exames que estão abrangidos pelo presente instrumento constam no anexo I deste instrumento, considerando as especificidades e custos elencados.\n\nParágrafo Segundo: O desenvolvimento de atividades que eventualmente não estejam contempladas no presente instrumento será, pactuadas entre as partes oportunamenteem separado.\n\nParágrafo Terceiro: O presente instrumento não gera qualquer relação de emprego ou vínculo empregatício entre as partes, principalmente no que diz respeito aos seus colaboradores.\n\nCLÁUSULA SEGUNDA – Da Forma de Pagamento: O CONTRATADO emitirá o correspondente relatório de serviço no mês posterior ao da realização dos exames, devendo o CONTRATANTE realizar o pagamento do valor estabelecido no relatório até dia 05 de cada mês.\n\nParágrafo Primeiro: Com a finalidade de balizar os valores correspondentes, deverá ser observado o anexo I deste contrato.\n\nParágrafo Segundo: Exames que, por ventura, não tenham sido acordados anteriormente,serão discutidos entre as partes antes de sua realização.\n\nParágrafo Terceiro: Havendo atraso no pagamento das parcelas pertinentes ao valor do presente contrato, incidirá multa de 2% (dois por cento) sobre o valor do débito, que será acrescido, ainda, de juros de mora de 1% (um por cento) ao mês, ou fração deste, além da devida correção monetária e demais encargos incidentes.\n\nParágrafo Quarto: Persistindo a mora por mais de trinta dias, poderá o CONTRATADO notificar o CONTRATANTE para que purgue a mora em 10 dias, sob pena de rescisão do contrato.\n\nParágrafo Quinto: Dando, o CONTRATANTE, causa à rescisão do contrato, em virtude de mora ou não, incorrerá a mesma no dever de pagar todas as parcelas devidas acrescidas da multa já pactuada acima, bem como metade dos valores vincendos até o término do prazo de vigência do contrato.\n\nCLÁUSULA TERCEIRA – Da Responsabilidade do Contratado: Corresponderá ao CONTRATADO o recebimento dos materiais coletados, a realização e liberação dos exames, emissão de laudos técnicos, realização de treinamento para os funcionários do CONTRATANTE quando necessário e/ou solicitado, bem como será fornecido pelo CONTRATADO tubos e agulhas para a coleta do material.\n\nParágrafo Único – É de inteira responsabilidade do CONTRATADO, dirimir qualquer dúvida ou questionamento que seja feito pelo CONTRATANTE a respeito de laudos e exames realizados.\n\nCLÁUSULA QUARTA – Da Vigência: O presente instrumento vigerá pelo prazo de doze meses e poderá ser prorrogado quantas vezes forem de interesse das partes.\n\nParágrafo Único: Sempre que, ao final do período de doze meses, existir o interesse em prorrogar o contrato, deverá ser realizado o correspondente termo aditivo, consolidandoou modificando as normas estabelecidas pela relação contratual.\n\nCLÁUSULA QUINTA – Da Confidencialidade: O CONTRATADO se obriga a manter total sigilo quanto ao conteúdo das informações e documentos prestados pela CONTRATANTE, bem como pelo conteúdo de todas as atividades desenvolvidas e suas condições, sob pena de responder pelos danos daí decorrentes, e vice-versa.\n\nCLÁUSULA SEXTA– Da Comunicação entre as Partes: As notificações e avisos deverão serencaminhados pelas Partes por escrito e entregues mediante protocolo ou\n\nAviso de recebimento.\n\nCLÁUSULA SÉTIMA - Do Relacionamento entre as Partes: O presente Contrato não gera para nenhuma das partes quaisquer outros direitos e obrigações diversos daqueles aqui expressamente previstos, ficando afastada qualquer relação, ostensiva ou remota, de sociedade, “joint-venture” ou associação entre as partes.\n\nParágrafo Único - No desempenho das obrigações previstas neste Contrato, as partes comprometem-se sempre a proceder dentro de elevado espírito de cooperação e boa fé, observando as determinações legais aplicáveis, e dentro dos melhores princípios de ética empresarial.\n\nCLÁUSULA OITAVA – Da Legitimidade: As partes declaram, sob as penas da Lei, que os signatários deste contrato são seus procuradores/representantes legais, devidamente constituídos na forma dos respectivos Estatutos/Contratos Sociais, com poderes para assumir as obrigações previstas neste contrato.\n\nCLÁUSULA NONA – Da Proteção de Dados: Por força do que prevê a Lei nº 13.709/18, todo e qualquer dado pessoal contido neste instrumento, principalmente aqueles que passam a integram a qualificação das partes, bem como possíveis dados bancários apresentados, estão sob sigilo e não se encontram autorizados quaisquer modalidades de tratamento, devendo os mesmos ser resguardados apenas e tão somente durante o período de cumprimento das obrigações aqui avençadas, incluindo na referida proteçãotodos os dados referentes aos funcionários contratados.\n\nParágrafo Único - Em caso de tratamento inadequado ou vazamento dos dados contidosneste instrumento, a parte que deu causa a mencionada violação estará sujeita às culminações legais previstas pela legislação destacada acima.\n\nCLÁUSULA DÉCIMA – Das Disposições Finais: É expressamente vedada a cessão ou transferência das obrigações e direitos previstos neste contrato a terceiros, salvo em comum acordo entre as partes.\n\nParágrafo Primeiro - Todos os entendimentos sobre o andamento, modificações ou alterações deste Contrato deverão ser feitos de comum acordo entre as Partes, com a mesma forma empregada aqui, por meio de seus representantes legais e/ou procuradores com poderes para tanto, sendo certo que os acordos verbais não produzirão quaisquer efeitos.\n\nParágrafo Segundo - Este Contrato obriga as Partes, seus sucessores e eventuais cessionários a qualquer título.\n\nParágrafo Terceiro - A eventual tolerância quanto a qualquer violação dos termos e condições deste Contrato será considerada mera liberalidade; não implicará tolerância\n\ncom qualquer outra violação de seus termos e condições e, nem ser var ATA_REFORMA_ESTATUTARIA_BASE = "ATA DA ASSEMBLEIA GERAL EXTRAORDINARIA DA ASSOCIACAO DOS DEPENDENTES QUIMICOS E PORTADORES DE DOENCAS PSIQUIATRICO DE SÃO MIGUEL DOS CAMPOS ALAGOAS\nAos vigésimo primeiro dia do mês de agosto as 15ː00 hs na sede da Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátrico de São Miguel dos Campos Alagoas, realizou se a Assembleia que teve seus trabalhos coordenado pela Presidente Naedja Silva Melo, que convidou a Secretaria Sra. Vera Cassia Correia da Silva para secretariar os trabalhos, que passou a ler o Edital da Assembleia Geral. A diretoria da ADQPAL no uso das suas atribuições legais que lhe confere o Estatuto Social vigente, convoca os Associados para se reunir em Assembleia Geral Extraordinária a ser realizar em sua sede na Praça Dr. Jose Inácio, 173 Centro. No dia 21 de agosto de 2019 as 15ː00 hs em 1° convocação com a maioria dos seus membros e em 2° convocação com um 1/3 dos seus membros para tratar da seguinte pautaː Reforma Estatutária e Assuntos diversos. Em seguida a Sra. Presidente explanou para os presentes a necessidades de se fazer a reforma do Estatuto, pois a Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátrico de São Miguel dos Campos, tem a necessidade de ampliar a sua Assistência nos setores saúde e Assistência Social, considerando a grande procura desses serviços por parte da população, que necessita de Assistência e tem dificuldades no acesso. A Associação procurou as Secretarias dos serviços acima citados para obter informações acerca de trazer esses serviços para dentro da Associação, onde foi informada que o Estatuto e limitado a Dependentes Químicos e pra abranger Assistência Social teria que constar no Estatuto da Entidade, por isso a necessidade de convocar essa Assembleia Extraordinária para debatermos o assunto e aprovar a reforma do Estatuto. Franqueou agora a palavra aos presentes para que se pronuncie com relação ao exposto tendo a Sra. Eliane Alves da Silva, 1.IDENTIFICAÇÃO:

2.FINALIDADE ESTATUTÁRIA:

A Associação dos Dependentes Químicos e Portadores de Doenças Psiquiátricas de São Miguel dos Campos – Alagoas ou abreviamente, ADQPAL. Fundada no dia 29 de fevereiro de 2012, na cidade de São Miguel dos Campos, é uma associação de direito privado filantrópica, sem fins lucrativos, com duração indeterminada, tendo sede e foro no município de São Miguel dos Campos, Alagoas.

A ADQPAL tem por finalidade geral estatutária de coordenar, defender e representar legalmente os pacientes com a sociedade promovendo, em função deles, e também de seus familiares e comunidades, sem distinção e discriminação de raça, cor, profissão, nacionalidade, sexo, credo religioso, orientação sexual ou político por meio de programas e projetos que sirvam às suas finalidades.

Constitui como finalidade específica da ADQPAL a conjunção de esforços, articulação de objetivos e harmonia de procedimentos, que se caracteriza por: Promover os princípios da cidadania. Garantir a pessoa com deficiência o direito ao acesso a todos os bens e serviços da sociedade, bem como o respeito pelos direitos civis, políticos, econômicos, sociais e culturais, para o efetivo exercício da cidadania plena; e o dever de desempenhar um papel ativo de desenvolvimento da sociedade; Promover o acesso a cuidados médicos gerais e da especialidade psiquiatria; prestar dos cuidados de enfermagem gerais e especializados em saúde mental e psiquiátrico; apoio psicossocial, de reabilitação e de integração na comunidade; apoio a familiares e ou cuidadores; promoção de atividades socioculturais e desportivas  em articulação  com autarquias, associações  culturais, desportivas e recreativas ou outras estruturas  da comunidade; promoção de uma política global, integral e transversal de prevenção , habilitação, reabilitação e participação da pessoa com dependência química e psiquiátrica; promoção da igualdade de oportunidade, no sentido de que a pessoa com dependência química e psiquiátrica disponha de condições que permitam a plena participação na sociedade; a prevenção de uso indevido, a atenção  e a reinserção social de usuários e dependentes de drogas; implantação de projetos socioeducativos  de prevenção do uso indevido de drogas, as instituições de ensino público e

privado, alinhados ás diretrizes curriculares nacionais e aos conhecimentos relacionados às drogas.

3. APRESENTAÇÃO DO PROJETO:

A cada dia que passa, cresce mais na sociedade o preconceito com os envolvidos com drogas e o uso destas aumenta incluindo o álcool. Hoje dependência química já é reconhecida pela OMS (organização Mundial de Saúde), como doença, que como qualquer outra, requer tratamento diante da grande quantidade de dependentes.

O vício em qualquer substância acaba gerando problemas sociais, físicos e familiares, portanto este necessita de cuidados médicos, levando em consideração o perfil do usuário, bem com a sua. Não podemos afirmar que há uma cura para a dependência química, pós ela é uma doença crônica, assim como diabetes e hipertensão, porém, o tratamento é possível.

4.JUSTIFICATIVA:

O uso ilícito de drogas nos últimos anos tem aumentado num ritmo alarmante e ultrapassado todas as fronteiras sociais, econômicas, políticas e nacionais. Esse aumento pode ser atribuído a vários fatores, entre os que figuram a falta de informação fidedigna sobre os perigos a longo e curto prazo do consumo de drogas; ao caráter limitado das atividades preventivas (quase que inexistentes em nosso país), e a falta de consciência sobre a magnitude do problema dos estupefacientes. Os problemas do uso indevido de drogas têm sido descritos como um excesso de consciência nos jovens e uma falta de consciência entre os adultos.

A prevenção do uso indevido de drogas – mediante a sensibilização, a educação e a ação – é fundamental para inibir o uso de entorpecentes e a criminalidade associada à mesma. Para aquelas pessoas que se iniciaram indevidamente nas drogas, a educação brinda um caminho para uma intervenção e um tratamento com êxito, para sensibilizá-las sobre os riscos e perigos do uso continuado de drogas, e lhes ajuda a deixar seu uso.

É necessário promover ações que valorizem a autoestima dos estudantes, que os mantenha ocupados com atividades saudáveis, enriquecedoras e atraentes para minar espaços por onde as drogas podem entrar. Mostrar-lhes o quanto são amados e acolhidos pela família, pela escola, pela comunidade, pela sociedade é mais do que dizer não às drogas, é erradicá-las.

O presente projeto surgiu da necessidade de se falar abertamente sobre as drogas e de trocar e adquirir informações sobre o assunto e promover uma ação preventiva, visto que o número de usuários tem se aumentado de forma assustadora.

5.OBJETIVO GERAL:

O presente projeto tem por objetivo a Construção de um Centro de Reabilitação Química na cidade de São Miguel dos Campos/AL, pois este serviço não é oferecido nas proximidades da cidade, assim atenderemos pacientes e familiares em local de melhor acesso, e que ofereça bem

estar para os pacientes não vejam como clínica médica e sim, como um centro receptivo. Um modelo diferente através da arquitetura, com condições de proporcionar um tratamento humanizado e eficaz, conseguindo auxiliar o paciente e na sociedade. O objetivo é então alcançar pessoas desta região e de diferentes idades que precisam de recuperação e reintegração social, através de terapias e atividades. Para a implantação do projeto, foi escolhido um local com presença na natureza, que é acessível, próximo de hospital e dentro mesmo da cidade. O centro de reabilitação terá características especificas para o tratamento, com salas de palestras aberta ao público para conscientização da população, atividades abertas em áreas verdes, fácil acesso ao transporte público e particular.

6.OBJETIVOS ESPECIFICOS:

►Propiciar às famílias atendidas, atividades e processos socioeducativos, por meio de reuniões, palestras e oficinas, que repercutam em oportunidades, garantindo nas ações a participação do indivíduo na opção e construção do seu projeto de vida.

►Promover ações que ajudem os usuários a conscientização e interação com problemas existentes na sociedade.

►Oferecer um acompanhamento que priorize e considere as necessidades e singularidades apresentadas por cada usuário e discutir a participação da família através de orientações, palestras, dinâmicas de grupos, entre outros.

►Priorizar momentos de troca, cuidado, atenção, solidariedade e ação em conjunto para transformação da realidade.

O Centro de Reabilitação para Dependentes Químicos será implantado na cidade de são Miguel dos Campos/AL, para atender as necessidades dos pacientes por meio de terapias, consultas médicas de diversas especialidades e atividades com uma equipe multidisciplinar a fim de proporcionar recuperação e reintegração social para todos que possuem essa doença e que requer um tratamento especializado, de acordo com cada necessidade e estado de saúde. Devido ao grande Crescimento de usuários que utiliza qualquer tipo de substância química, se torna cada vez mais difícil a aceitação e a convivência com a sociedade.

O Centro de Reabilitação na cidade de são Miguel dos Campos-AL, vem beneficiar a população e cidades circunvizinhas. O local será um ambiente termicamente confortável e aconchegante, boa iluminação, ventilação natural, arejada e rodeada por vegetação, possui ambientes abertos contendo áreas de lazer como campo de futebol, quadra de areia, local de estar em meio a natureza e pescaria.

7.RECURSOS HUMANOS:

A NOVA SEDE contará com uma equipe multidisciplinar, a qual será composta por:

Assistente Social, Psicólogo, Clinico Geral, Psiquiatra, Geriatra, Fisioterapeuta, Terapeuta Ocupacional, Nutricionista, Enfermeiro (a), Técnico de Enfermagem, Ortopedista e traumatologia, Cardiologista, Endocrinologia, Gastrenterologia, Oftalmologia, Otorrinolaringologia,

Fonoaudiologia, Odontologia, Psiquiatria, Urologia, Neurologia, Neuropedratra, Vascular, Nutrólogo, Bucomaxilofacial, Pneumologista, Psicopedagogo, Neuroposcopedagogia, Mastologia, Geriatra, Proctologista, Hematologia, Infectologia, Reumatologia.

8.PÚBLICO ALVO DA INSTITUIÇAO:

Os serviços socioassistenciais prestados pela instituição destinam-se à JOVEM E ADOLESCENTES na faixa etária entre 12 e 16 anos de idade, adolescentes 18 anos de idade Acima e suas respectivas famílias em situação de risco pessoal, social, psicossocial e de vulnerabilidade. Destinam-se também as pessoas usuárias de drogas, sejam elas, lícitas ou ilícitas, que busquem voluntariamente os serviços prestados ou que são encaminhadas pelas instituições de garantias de direitos, como Conselho Tutelar, Poder Judiciário ou outras instituições.

9.CONCLUSÃO:

Os efeitos das drogas é uma doença que não tem cura, mas tem tratamento para reduzir seus sintomas, apesar de ser uma doença que atinge a sociedade, ela precisa ser compreendida e passada a devida atenção necessária, em nosso país são muitos os centros de atendimentos, desde lugares simples até clinica particulares, a necessidade de atendimento ao próximo, aumenta cada vez mais e a falta de lugares destinados a esse cuidado às vez\es deixa muito a desejar.

A falta de consciência em nossos jovens, o abuso de drogas, dependência química, o aumento da violência, depressão, entre outros males afetam não só nossas capitais, mas também o interior que muitas vezes necessita desse tipo de atendimento.

O Centro de Reabilitação, vem para somar ao Município e cidades circunvizinhas, sendo um ponto de apoio e estrutura para os jovens e adultos que estão sem esperança, trazendo a eles novamente uma nova chance, uma nova oportunidade para a vida, mostrando uma realidade que foi escondida, tirada de si pelo consumismo e materialismo.

Precisa-se de tempo, de espaço e de medicação, o contato com a beleza da natureza ajuda a encontrar o mais puro silêncio da alma, ajuda no tratamento e da cura interior, precisa-se de um lugar arquitetado para isso.
